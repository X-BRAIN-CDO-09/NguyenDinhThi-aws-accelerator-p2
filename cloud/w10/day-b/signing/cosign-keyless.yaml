name: Build, Push & Sign Image (Keyless OIDC)

on:
  push:
    branches: [main]
    paths: [app/**]

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository }}/backend

jobs:
  build-sign:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write    # Required for keyless OIDC signing via Fulcio

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless OIDC — no COSIGN_KEY needed)
        # Fulcio issues a short-lived certificate bound to GitHub OIDC identity
        # Rekor records the signature in a public transparency log
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
