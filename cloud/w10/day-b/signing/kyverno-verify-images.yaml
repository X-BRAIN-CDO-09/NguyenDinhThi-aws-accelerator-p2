---
# ClusterPolicy: verify-image-signatures
# Rejects pods whose images are not signed via Cosign keyless OIDC
# Requires: Kyverno >= 1.10 installed in cluster
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signatures
  annotations:
    policies.kyverno.io/title: Verify Image Signatures
    policies.kyverno.io/description: >
      Require all container images in namespace "app" to be signed with Cosign
      via GitHub Actions OIDC. Unsigned or tampered images are rejected at admission.
spec:
  validationFailureAction: Enforce   # Deny unsigned images (use Audit to test first)
  background: false                  # Only check at admission, not existing pods
  rules:
    - name: verify-backend-image
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [app]
      verifyImages:
        - imageReferences:
            - "ghcr.io/X-BRAIN-CDO-09/NguyenDinhThi-aws-accelerator-p2/backend*"
          attestors:
            - count: 1
              entries:
                - keyless:
                    subject: "https://github.com/X-BRAIN-CDO-09/NguyenDinhThi-aws-accelerator-p2/.github/workflows/*"
                    issuer: "https://token.actions.githubusercontent.com"
                    rekor:
                      url: https://rekor.sigstore.dev
          mutateDigest: true     # Replace tag with digest to prevent tag mutation attacks
          verifyDigest: true
          required: true
