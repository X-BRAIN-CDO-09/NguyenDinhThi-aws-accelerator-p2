---
# ExternalSecret: syncs /w10/db/credentials from AWS Secrets Manager to K8s Secret
# refreshInterval: 60s → ESO polls every 60 seconds, updates K8s Secret automatically
# Pods that mount this Secret as a volume will get the new value on next file read
# (no pod restart needed when using volume mount — env vars DO require restart)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-credentials
  namespace: app
spec:
  refreshInterval: 60s
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: db-credentials        # K8s Secret name created/updated by ESO
    creationPolicy: Owner       # ESO owns the Secret — deleted when ExternalSecret deleted
  data:
    - secretKey: password       # key in K8s Secret
      remoteRef:
        key: /w10/db/credentials
        property: password      # JSON key inside the Secrets Manager secret value

    - secretKey: username
      remoteRef:
        key: /w10/db/credentials
        property: username
