---
# SecretStore: connects ESO to AWS Secrets Manager via IRSA
# IRSA = IAM Roles for Service Accounts — no static credentials in cluster
# Prereq: ESO installed (helm install external-secrets external-secrets/external-secrets)
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secretsmanager
  namespace: app
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-southeast-1
      auth:
        jwt:
          serviceAccountRef:
            name: eso-sa   # must have eks.amazonaws.com/role-arn annotation
---
# ServiceAccount for ESO — annotated with IAM role ARN (set by Terraform/eksctl)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-sa
  namespace: app
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/w10-eso-secrets-reader
