name: Trivy Image Scan

on:
  push:
    branches: [main]
    paths: [app/**]
  pull_request:
    paths: [app/**]

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # Upload SARIF to GitHub Security tab

    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build -t scan-target:${{ github.sha }} ./app

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: scan-target:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: 1          # Fail CI if HIGH or CRITICAL found (no exception)
          ignore-unfixed: true  # Skip vulns with no fix available

      - name: Upload SARIF to GitHub Security tab
        if: always()            # Upload even when scan fails so results are visible
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Run Trivy config scan (IaC misconfigs)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 0          # Config scan is advisory, does not block merge yet
