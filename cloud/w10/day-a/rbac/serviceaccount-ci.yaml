---
# ServiceAccount: ci-deployer — used by GitHub Actions to deploy to namespace "app"
# IRSA annotation links this SA to an IAM Role (set via Terraform or eksctl)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ci-deployer
  namespace: app
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/w10-ci-deployer-role
---
# Role: allows CI to deploy (create/update) but not delete or modify RBAC
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ci-deployer
  namespace: app
rules:
  - apiGroups: [apps]
    resources: [deployments, replicasets]
    verbs: [get, list, watch, create, update, patch]
  - apiGroups: [argoproj.io]
    resources: [rollouts]
    verbs: [get, list, watch, create, update, patch]
  - apiGroups: [""]
    resources: [configmaps, services, secrets]
    verbs: [get, list, watch, create, update, patch]
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ci-deployer-binding
  namespace: app
subjects:
  - kind: ServiceAccount
    name: ci-deployer
    namespace: app
roleRef:
  kind: Role
  name: ci-deployer
  apiGroup: rbac.authorization.k8s.io
