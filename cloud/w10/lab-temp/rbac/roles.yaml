# ─────────────────────────────────────────────────────────────────────────────
# alice: developer — CRUD workloads in namespace demo
# Enhanced: added batch (Jobs/CronJobs), argoproj.io (Rollouts),
#           pods/log, pods/exec, replicasets, statefulsets, daemonsets
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: developer
  namespace: demo
rules:
  - apiGroups: ["", "apps"]
    resources:
      - deployments
      - pods
      - services
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch", "create", "update", "delete", "patch"]
  - apiGroups: [""]
    resources:
      - pods/log
      - pods/exec
    verbs: ["get", "create"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch", "create", "update", "delete", "patch"]
  - apiGroups: ["argoproj.io"]
    resources:
      - rollouts
      - rollouts/status
      - rollouts/scale
      - analysisruns
      - analysistemplates
      - experiments
    verbs: ["get", "list", "watch", "create", "update", "delete", "patch"]
---
# ─────────────────────────────────────────────────────────────────────────────
# bob: SRE — view + exec + troubleshoot pods cluster-wide
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sre
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["namespaces", "nodes", "services", "endpoints", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
---
# ─────────────────────────────────────────────────────────────────────────────
# carol: viewer — read-only across entire cluster
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: viewer
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
