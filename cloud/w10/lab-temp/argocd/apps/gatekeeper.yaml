apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatekeeper
  namespace: argocd
  annotations:
    argocdcd.argoproj.io/sync-wave: "-10"
spec:
  project: default
  source:
    repoURL: https://open-policy-agent.github.io/gatekeeper/charts
    chart: gatekeeper
    targetRevision: 3.14.0
    helm:
      values: |
        replicas: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: gatekeeper
  syncpolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true