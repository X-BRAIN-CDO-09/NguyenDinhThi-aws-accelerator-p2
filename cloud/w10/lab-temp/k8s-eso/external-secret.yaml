apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-creds
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  # Enhanced: 10s interval for fast rotation demo (vs default 1m)
  refreshInterval: 10s
  secretStoreRef:
    name: aws-store
    kind: SecretStore
  target:
    name: db-secret
    creationPolicy: Owner
  data:
  - secretKey: password
    remoteRef:
      key: prod/db/password
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
