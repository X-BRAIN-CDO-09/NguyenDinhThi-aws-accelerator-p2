# RBAC: least-privilege role binding for payments-dev
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: payments-dev-rolebinding
  namespace: payments
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: payments-dev-role
subjects:
- kind: User
  name: payments-dev
  apiGroup: rbac.authorization.k8s.io
