apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  namespace: payments
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payments-api
  template:
    metadata:
      labels:
        app: payments-api
    spec:
      containers:
      - name: api
        image: ghcr.io/x-brain-cdo-09/nguyendinhthi-aws-accelerator-p2/w10-api:0.0.5
        imagePullPolicy: IfNotPresent
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
          requests:
            cpu: 50m
            memory: 32Mi
        ports:
        - containerPort: 8080
          protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: payments-api
  namespace: payments
spec:
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
  selector:
    app: payments-api
