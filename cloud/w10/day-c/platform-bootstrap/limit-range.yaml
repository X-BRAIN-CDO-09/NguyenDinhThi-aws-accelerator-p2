---
# LimitRange: sets default resource request/limit for containers that don't declare them
# Without this, a container with no limits can consume all node resources (noisy neighbor)
apiVersion: v1
kind: LimitRange
metadata:
  name: app-limit-range
  namespace: app
spec:
  limits:
    - type: Container
      default:           # Applied when container has no "limits:" section
        cpu: 200m
        memory: 256Mi
      defaultRequest:    # Applied when container has no "requests:" section
        cpu: 100m
        memory: 128Mi
      max:               # Hard ceiling — container cannot request more than this
        cpu: "2"
        memory: 2Gi
      min:               # Floor — prevents starvation by setting minimum
        cpu: 10m
        memory: 32Mi
    - type: Pod
      max:
        cpu: "4"
        memory: 4Gi
    - type: PersistentVolumeClaim
      max:
        storage: 20Gi
      min:
        storage: 1Gi
