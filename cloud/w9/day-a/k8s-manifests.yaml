apiVersion: v1
kind: Namespace
metadata:
  name: app
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-html
  namespace: app
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>W9 Platform - Deliver Smartly</title>
      <style>
        :root {
          --bg-color: #ffffff;
          --text-color: #333333;
          --card-bg: #f5f5f7;
          --accent-color: #0071e3;
        }
        [data-theme="dark"] {
          --bg-color: #1d1d1f;
          --text-color: #f5f5f7;
          --card-bg: #2d2d2f;
          --accent-color: #2997ff;
        }
        body {
          margin: 0;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
          background-color: var(--bg-color);
          color: var(--text-color);
          transition: background-color 0.3s, color 0.3s;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
        }
        .container {
          max-width: 600px;
          padding: 2rem;
          background-color: var(--card-bg);
          border-radius: 12px;
          box-shadow: 0 4px 20px rgba(0,0,0,0.1);
          text-align: center;
        }
        h1 {
          color: var(--accent-color);
          margin-bottom: 1rem;
        }
        p {
          font-size: 1.1rem;
          line-height: 1.6;
        }
        .btn-theme {
          background-color: var(--accent-color);
          color: #ffffff;
          border: none;
          padding: 10px 20px;
          font-size: 1rem;
          border-radius: 6px;
          cursor: pointer;
          margin-top: 1.5rem;
          transition: opacity 0.2s;
        }
        .btn-theme:hover {
          opacity: 0.9;
        }
      </style>
    </head>
    <body>
      <div class="container">
        <h1>W9 Platform - Deliver Smartly</h1>
        <p>GitOps + Observability + Canary Auto-Abort platform running on Kubernetes.</p>
        <button class="btn-theme" onclick="toggleTheme()">Toggle Dark/Light Mode</button>
      </div>
      <script>
        function toggleTheme() {
          const currentTheme = document.documentElement.getAttribute('data-theme');
          const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', newTheme);
          localStorage.setItem('theme', newTheme);
        }
        // Load preference
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
      </script>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-app
  namespace: app
  labels:
    app: simple-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-app
  template:
    metadata:
      labels:
        app: simple-app
    spec:
      containers:
        - name: simple-app
          image: nginx:alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: frontend-html
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "25m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
      volumes:
        - name: frontend-html
          configMap:
            name: frontend-html
---
apiVersion: v1
kind: Service
metadata:
  name: simple-app-service
  namespace: app
  labels:
    app: simple-app
spec:
  type: ClusterIP
  selector:
    app: simple-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
