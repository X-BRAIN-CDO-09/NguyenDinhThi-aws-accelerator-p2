apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: demo
data:
  default.conf: |
    server {
        listen 80;
        server_name localhost;

        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://backend-service.demo.svc.cluster.local:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

  index.html: |
    <!DOCTYPE html>
    <html lang="vi" data-theme="dark">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Cổng Giao Diện GitOps - Premium Portal</title>
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;600;700&display=swap');
        
        :root {
          --bg-primary: #f8fafc;
          --bg-gradient: radial-gradient(circle at 10% 20%, rgba(243, 244, 246, 1) 0%, rgba(224, 231, 255, 0.4) 90%);
          --surface: rgba(255, 255, 255, 0.7);
          --surface-border: rgba(99, 102, 241, 0.08);
          --text-primary: #0f172a;
          --text-secondary: #475569;
          --accent: #4f46e5;
          --accent-glow: rgba(79, 70, 229, 0.15);
          --accent-hover: #4338ca;
          --success: #059669;
          --success-glow: rgba(5, 150, 105, 0.1);
          --card-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05);
          --font-sans: 'Plus Jakarta Sans', sans-serif;
          --font-mono: 'Space Grotesk', monospace;
        }

        [data-theme="dark"] {
          --bg-primary: #030712;
          --bg-gradient: radial-gradient(circle at top right, #11103d 0%, #030712 80%);
          --surface: rgba(17, 24, 39, 0.65);
          --surface-border: rgba(255, 255, 255, 0.05);
          --text-primary: #f9fafb;
          --text-secondary: #9ca3af;
          --accent: #818cf8;
          --accent-glow: rgba(129, 140, 248, 0.25);
          --accent-hover: #6366f1;
          --success: #34d399;
          --success-glow: rgba(52, 211, 153, 0.15);
          --card-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.5);
        }

        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
          transition: background 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), 
                      color 0.3s ease, 
                      border-color 0.3s ease, 
                      box-shadow 0.3s ease;
        }

        body {
          font-family: var(--font-sans);
          background: var(--bg-primary);
          background-image: var(--bg-gradient);
          color: var(--text-primary);
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          padding: 24px;
          overflow-x: hidden;
        }

        .background-decor {
          position: absolute;
          width: 500px;
          height: 500px;
          background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
          top: 10%;
          left: 15%;
          z-index: -1;
          filter: blur(40px);
          pointer-events: none;
        }

        .container {
          background: var(--surface);
          backdrop-filter: blur(24px);
          -webkit-backdrop-filter: blur(24px);
          border: 1px solid var(--surface-border);
          border-radius: 32px;
          padding: 48px;
          width: 100%;
          max-width: 650px;
          box-shadow: var(--card-shadow);
          text-align: center;
          position: relative;
          z-index: 1;
        }

        .container::before {
          content: '';
          position: absolute;
          top: 0;
          left: 10%;
          right: 10%;
          height: 2px;
          background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .badge {
          display: inline-flex;
          align-items: center;
          gap: 6px;
          background: var(--accent-glow);
          border: 1px solid var(--surface-border);
          color: var(--accent);
          padding: 6px 16px;
          border-radius: 100px;
          font-size: 0.8rem;
          font-weight: 600;
          letter-spacing: 0.05em;
          text-transform: uppercase;
          margin-bottom: 24px;
        }

        .badge-dot {
          width: 6px;
          height: 6px;
          background-color: var(--success);
          border-radius: 50%;
          box-shadow: 0 0 8px var(--success);
          animation: pulse 2s infinite;
        }

        h1 {
          font-family: var(--font-sans);
          font-weight: 800;
          font-size: 2.8rem;
          line-height: 1.15;
          margin-bottom: 16px;
          letter-spacing: -0.03em;
          background: linear-gradient(135deg, var(--text-primary) 30%, var(--accent) 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        }

        p {
          color: var(--text-secondary);
          font-size: 1.05rem;
          line-height: 1.6;
          margin-bottom: 32px;
          font-weight: 400;
        }

        .action-group {
          display: flex;
          justify-content: center;
          gap: 16px;
          flex-wrap: wrap;
          margin-bottom: 32px;
        }

        .btn {
          font-family: var(--font-sans);
          font-weight: 600;
          font-size: 0.95rem;
          padding: 14px 28px;
          border-radius: 16px;
          border: 1px solid transparent;
          cursor: pointer;
          display: flex;
          align-items: center;
          gap: 8px;
          transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-primary {
          background: var(--accent);
          color: #ffffff;
          box-shadow: 0 10px 20px -5px var(--accent-glow);
        }

        .btn-primary:hover {
          background: var(--accent-hover);
          transform: translateY(-2px);
          box-shadow: 0 15px 30px -5px var(--accent-glow);
        }

        .btn-secondary {
          background: transparent;
          border: 1px solid var(--surface-border);
          color: var(--text-primary);
        }

        .btn-secondary:hover {
          background: var(--accent-glow);
          transform: translateY(-2px);
        }

        .btn:active {
          transform: translateY(0);
        }

        .console-container {
          background: rgba(0, 0, 0, 0.25);
          border: 1px solid var(--surface-border);
          border-radius: 20px;
          padding: 24px;
          text-align: left;
          font-family: var(--font-mono);
          position: relative;
          overflow: hidden;
        }

        [data-theme="light"] .console-container {
          background: rgba(15, 23, 42, 0.05);
        }

        .console-header {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 16px;
          font-size: 0.75rem;
          text-transform: uppercase;
          letter-spacing: 0.1em;
          color: var(--text-secondary);
        }

        .console-dots {
          display: flex;
          gap: 6px;
        }

        .console-dot {
          width: 8px;
          height: 8px;
          border-radius: 50%;
          background: #ef4444;
        }
        .console-dot:nth-child(2) { background: #eab308; }
        .console-dot:nth-child(3) { background: #22c55e; }

        .console-body {
          color: var(--text-secondary);
          font-size: 0.9rem;
          line-height: 1.5;
          max-height: 200px;
          overflow-y: auto;
          white-space: pre-wrap;
        }

        .highlight-success {
          color: var(--success);
          font-weight: 600;
        }

        @keyframes pulse {
          0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.7); }
          70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(52, 211, 153, 0); }
          100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }
        }

        @media (max-width: 640px) {
          .container { padding: 32px 24px; }
          h1 { font-size: 2.2rem; }
        }
      </style>
    </head>
    <body>
      <div class="background-decor"></div>
      <div class="container">
        <div class="badge">
          <span class="badge-dot"></span>
          GitOps App-of-Apps Active
        </div>
        <h1>Portal Frontend</h1>
        <p>Giao diện được đồng bộ tự động qua GitOps. Kết nối nội bộ tới API Backend thông qua DNS K8s và Reverse Proxy Nginx.</p>
        
        <div class="action-group">
          <button class="btn btn-primary" onclick="fetchBackendAPI()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/></svg>
            Gọi API Backend
          </button>
          <button class="btn btn-secondary" onclick="toggleInterfaceTheme()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m11.314 11.314l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
            Thay Đổi Theme
          </button>
        </div>

        <div class="console-container">
          <div class="console-header">
            <div class="console-dots">
              <span class="console-dot"></span>
              <span class="console-dot"></span>
              <span class="console-dot"></span>
            </div>
            <span>API CONSOLE</span>
          </div>
          <div id="console-output" class="console-body">Nhấn nút "Gọi API Backend" để bắt đầu gửi request qua Nginx proxy `/api/api.json`...</div>
        </div>
      </div>

      <script>
        function toggleInterfaceTheme() {
          const root = document.documentElement;
          const currentTheme = root.getAttribute('data-theme');
          const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
          root.setAttribute('data-theme', newTheme);
          localStorage.setItem('portal-theme', newTheme);
        }

        function fetchBackendAPI() {
          const out = document.getElementById('console-output');
          out.innerHTML = `<span style="color: var(--accent)">> GET /api/api.json...</span>\nĐang gửi request thông qua proxy K8s nội bộ...`;
          
          fetch('/api/api.json')
            .then(res => {
              if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
              return res.json();
            })
            .then(data => {
              out.innerHTML = `<span class="highlight-success">> HTTP 200 OK</span>\n\n<span style="color: var(--text-primary)">${JSON.stringify(data, null, 2)}</span>`;
            })
            .catch(err => {
              // Hỗ trợ mock offline fallback nếu chạy ngoài cluster
              out.innerHTML = `<span style="color: #ef4444">> Request failed: ${err.message}</span>\n\n<span style="color: var(--text-secondary)">Lưu ý: Nginx Proxy sẽ hoạt động khi chạy trong cluster Kubernetes.\nĐịa chỉ DNS thực tế: http://backend-service.demo.svc.cluster.local/api.json\n\nDữ liệu mô phỏng phản hồi (Mock Fallback):\n{</span>\n  "status": "success",\n  "message": "Kết nối thành công tới Backend API (Mock)!",\n  "database": "connected",\n  "from": "backend-service.demo.svc.cluster.local"\n}`;
            });
        }

        // Khôi phục theme lưu trữ
        const savedTheme = localStorage.getItem('portal-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
      </script>
    </body>
    </html>

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: demo
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: frontend-html-vol
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
            - name: frontend-nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: frontend-html-vol
          configMap:
            name: frontend-config
            items:
              - key: index.html
                path: index.html
        - name: frontend-nginx-config
          configMap:
            name: frontend-config
            items:
              - key: default.conf
                path: default.conf
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: demo
  labels:
    app: frontend
spec:
  type: NodePort
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30090
  selector:
    app: frontend
