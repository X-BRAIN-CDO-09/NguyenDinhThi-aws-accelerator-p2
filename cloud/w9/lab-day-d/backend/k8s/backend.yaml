apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: demo
data:
  api.json: |
    {
      "status": "success",
      "message": "Kết nối thành công tới Backend API thực tế!",
      "environment": "production",
      "database": "connected",
      "theme_mode": "supported",
      "timestamp": "2026-06-11T11:40:00Z"
    }
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: backend
  namespace: demo
  labels:
    app: backend
spec:
  replicas: 2
  strategy:
    canary:
      analysis:
        templates:
          - templateName: success-rate-analysis
        args:
          - name: service-name
            value: backend-service
      steps:
        - setWeight: 20
        - pause: { duration: 30s }
        - setWeight: 50
        - pause: { duration: 30s }
        - setWeight: 100
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: nginx:alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: backend-api-vol
              mountPath: /usr/share/nginx/html/api.json
              subPath: api.json
          readinessProbe:
            httpGet:
              path: /api.json
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api.json
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "25m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
      volumes:
        - name: backend-api-vol
          configMap:
            name: backend-config
            items:
              - key: api.json
                path: api.json
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: demo
  labels:
    app: backend
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
---
apiVersion: v1
kind: Service
metadata:
  name: backend-preview-service
  namespace: demo
  labels:
    app: backend
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30081
---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate-analysis
  namespace: demo
spec:
  args:
    - name: service-name
  metrics:
    - name: success-rate
      interval: 10s
      successCondition: result[0] >= 0.95
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus-stack-kube-prom-prometheus.monitoring.svc.cluster.local:9090
          query: |
            sum(rate(http_requests_total{status=~"2.."}[1m]))
            /
            sum(rate(http_requests_total[1m]))
