apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: demo
data:
  api.json: |
    {
      "status": "success",
      "message": "Kết nối thành công tới Backend API thực tế!",
      "environment": "production",
      "database": "connected",
      "theme_mode": "supported",
      "timestamp": "2026-06-11T11:40:00Z"
    }
  nginx.conf: |
    user  nginx;
    worker_processes  auto;
    error_log  /var/log/nginx/error.log warn;
    pid        /var/run/nginx.pid;

    events {
        worker_connections  1024;
    }

    http {
        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;
        log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent" "$http_x_forwarded_for"';
        access_log  /var/log/nginx/access.log  main;
        sendfile        on;
        keepalive_timeout  65;

        server {
            listen 80;
            server_name localhost;

            location / {
                root   /usr/share/nginx/html;
                index  index.html index.htm;
            }

            # nginx stub_status endpoint - dùng cho prometheus-exporter scrape
            location /stub_status {
                stub_status on;
                allow 127.0.0.1;
                deny all;
            }
        }
    }
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: backend
  namespace: demo
  labels:
    app: backend
spec:
  replicas: 2
  strategy:
    canary:
      canaryService: backend-preview-service
      stableService: backend-service
      analysis:
        templates:
          - templateName: success-rate-analysis
        args:
          - name: service-name
            value: backend-service
      steps:
        - setWeight: 20
        - pause: { duration: 30s }
        - setWeight: 50
        - pause: { duration: 30s }
        - setWeight: 100
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9113"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        # Container chính: nginx phục vụ API JSON
        - name: backend
          image: nginx:alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: backend-api-vol
              mountPath: /usr/share/nginx/html/api.json
              subPath: api.json
            - name: nginx-config-vol
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          readinessProbe:
            httpGet:
              path: /api.json
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api.json
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "25m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"

        # Sidecar: nginx-prometheus-exporter scrape stub_status và export metrics
        - name: metrics-exporter
          image: nginx/nginx-prometheus-exporter:1.3.0
          args:
            - --nginx.scrape-uri=http://127.0.0.1/stub_status
          ports:
            - containerPort: 9113
              name: metrics
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"

      volumes:
        - name: backend-api-vol
          configMap:
            name: backend-config
            items:
              - key: api.json
                path: api.json
        - name: nginx-config-vol
          configMap:
            name: backend-config
            items:
              - key: nginx.conf
                path: nginx.conf
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: demo
  labels:
    app: backend
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
---
apiVersion: v1
kind: Service
metadata:
  name: backend-preview-service
  namespace: demo
  labels:
    app: backend
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30081
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: backend-metrics-monitor
  namespace: demo
  labels:
    release: prometheus-stack
spec:
  selector:
    matchLabels:
      app: backend
  endpoints:
    - port: metrics
      interval: 5s
      path: /metrics
---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate-analysis
  namespace: demo
spec:
  args:
    - name: service-name
  metrics:
    # Metric 1: Kiểm tra nginx active connections > 0 (service đang nhận traffic)
    - name: nginx-connections-alive
      initialDelay: 20s
      interval: 15s
      count: 3
      # Argo Rollouts: result là mảng, dùng result[0] với scalar()
      successCondition: result >= 0
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus-stack-kube-prom-prometheus.monitoring.svc.cluster.local:9090
          query: >-
            scalar(sum(nginx_connections_active{namespace="demo"}) or vector(0))
