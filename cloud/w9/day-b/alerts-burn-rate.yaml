apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: slo-burn-rate-alerts
  namespace: app
  labels:
    role: alert-rules
    prometheus: k8s
spec:
  groups:
  - name: simple-app-slo
    rules:
    # Availability SLI: Ratio of successful requests (2xx) over total requests.
    # SLO: 99.0% availability. Error budget = 1.0%
    
    # 1-hour burn rate > 14.4 (converts to 2% budget consumption in 1h). Page Alert.
    - alert: SimpleAppAvailabilityFastBurnPage
      expr: |
        (
          sum(rate(http_requests_total{status!~"2.."}[1h]))
          /
          sum(rate(http_requests_total[1h]))
        ) > 0.144
        and
        (
          sum(rate(http_requests_total{status!~"2.."}[5m]))
          /
          sum(rate(http_requests_total[5m]))
        ) > 0.144
      for: 2m
      labels:
        severity: critical
        tier: platform
      annotations:
        summary: "High error burn rate detected for simple-app (Fast 1h/5m window)"
        description: "Availability SLO error budget is burning rapidly (burn rate > 14.4, current: {{ $value | printf \"%.2f\" }}). Immediate intervention is required."

    # 6-hour burn rate > 6 (converts to 5% budget consumption in 6h). Ticket/Slack Alert.
    - alert: SimpleAppAvailabilitySlowBurnTicket
      expr: |
        (
          sum(rate(http_requests_total{status!~"2.."}[6h]))
          /
          sum(rate(http_requests_total[6h]))
        ) > 0.06
        and
        (
          sum(rate(http_requests_total{status!~"2.."}[30m]))
          /
          sum(rate(http_requests_total[30m]))
        ) > 0.06
      for: 15m
      labels:
        severity: warning
        tier: platform
      annotations:
        summary: "Slow error burn rate detected for simple-app (Slow 6h/30m window)"
        description: "Availability SLO error budget is burning steadily (burn rate > 6, current: {{ $value | printf \"%.2f\" }}). Please inspect logs."
