# ============================================================
# ArgoCD Application: kube-prometheus-stack (Helm)
# Lab 1 buổi chiều: Cài qua GitOps — KHÔNG kubectl helm install tay
# root tự phát hiện file này và tạo Application
#
# Gap 1 + Gap 5: AlertManager email + inhibition rules
# Config AlertManager từ Secret alertmanager-kube-prometheus-stack
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"   # Wave 0: cài nền tảng trước
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 65.1.1
    helm:
      values: |
        prometheus:
          prometheusSpec:
            # Cho phép pick up ServiceMonitor từ mọi namespace
            serviceMonitorSelectorNilUsesHelmValues: false
            ruleSelector: {}
            ruleSelectorNilUsesHelmValues: false

        grafana:
          adminPassword: admin123
          sidecar:
            dashboards:
              enabled: true
              searchNamespace: ALL

        # ── Gap 1 + Gap 5: AlertManager Email + Inhibition ──
        alertmanager:
          alertmanagerSpec:
            retention: 24h
            # ⭐ Đọc config từ Secret thay vì hardcode trong Helm values
            # Secret: alertmanager-kube-prometheus-stack (infra/k8s/alertmanager-config.yaml)
            # Chứa: SMTP settings, routes, inhibition rules, receivers
            configSecret: alertmanager-kube-prometheus-stack

          # Expose AlertManager UI qua NodePort để xem alert status
          service:
            type: NodePort
            nodePort: 30093   # http://minikube_ip:30093

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true    # Cần cho CRD size lớn
