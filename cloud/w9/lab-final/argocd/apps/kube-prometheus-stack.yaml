# ============================================================
# ArgoCD Application: kube-prometheus-stack (Helm)
# Lab 1 buổi chiều: Cài qua GitOps — KHÔNG kubectl helm install tay
# root tự phát hiện file này và tạo Application
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"   # Wave 0: cài nền tảng trước
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 65.1.1
    helm:
      values: |
        prometheus:
          prometheusSpec:
            # Cho phép pick up ServiceMonitor từ mọi namespace
            serviceMonitorSelectorNilUsesHelmValues: false
            ruleSelector: {}
            ruleSelectorNilUsesHelmValues: false
        grafana:
          adminPassword: admin123
          sidecar:
            dashboards:
              enabled: true
              searchNamespace: ALL
        alertmanager:
          alertmanagerSpec:
            retention: 24h
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true    # Cần cho CRD size lớn
