# ==============================================================================
# FILE: backend/k8s/rollout.yaml
# Argo Rollout — Backend Canary Deployment
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  HƯỚNG DẪN CHỌN CHẾ ĐỘ — Chỉ cần mở/đóng comment phần tương ứng      │
# │                                                                         │
# │  [CASE A] Lab 3 — Auto Canary (Happy Path, v2 lành mạnh)               │
# │           ERROR_RATE=0 | VERSION=v2 | steps: pause 30s auto            │
# │                                                                         │
# │  [CASE B] Lab 3 — Auto-Abort Canary (Challenge, v3 lỗi 20%)            │
# │           ERROR_RATE=0.2 | VERSION=v3 | steps: pause 5m (đủ để fail)   │
# │                                                                         │
# │  [CASE C] Lab 4 — Manual Promote (SS-28, SS-29)                        │
# │           ERROR_RATE=0 | VERSION=v4-manual | steps: pause: {} vô hạn   │
# │                                                                         │
# │  [CASE D] Lab 5 — Git Revert Rollback (SS-33, SS-34)                   │
# │           ERROR_RATE=0 | VERSION=v2 | steps: pause 30s (giống Case A)  │
# │                                                                         │
# │  SAU KHI ĐỔI: git add . && git commit -m "switch to case X"            │
# │               git push → ArgoCD tự sync trong ~30s                     │
# └─────────────────────────────────────────────────────────────────────────┘
# ==============================================================================

apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: backend
  namespace: demo
  labels:
    app: backend
  annotations:
    argocd.argoproj.io/sync-wave: "1"

    # ── Đổi label này theo case đang dùng để dễ track ──
    #lab: "lab3-auto-canary"          # CASE A
    #lab: "lab3-auto-abort-challenge" # CASE B
    lab: "lab4-manual-promote"        # CASE C  ← ĐANG DÙNG
    #lab: "lab5-git-revert"           # CASE D

spec:
  replicas: 4
  revisionHistoryLimit: 5   # Giữ 5 để thấy đủ history cho SS-36
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: api
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080

          # ════════════════════════════════════════════════════════════════
          # IMAGE — Chọn image theo case
          # ════════════════════════════════════════════════════════════════
          #image: w9-api:1   # Baseline stable (v1)
          #image: w9-api:2   # CASE A, CASE D — Happy path promote
          #image: w9-api:3   # CASE B — Challenge: canary có lỗi (ERROR_RATE=0.2)
          image: w9-api:2    # CASE C — Lab 4: image bình thường, test manual gate

          env:
            # ──────────────────────────────────────────────────────────────
            # ERROR_RATE — Tỉ lệ lỗi 5xx của API
            #   "0"   → Healthy, AnalysisRun PASS  (CASE A, C, D)
            #   "0.1" → 10% lỗi, vẫn dưới threshold 5% SLO    (thử nghiệm)
            #   "0.2" → 20% lỗi, AnalysisRun FAIL → Auto-Abort (CASE B)
            #   "0.5" → 50% lỗi, Prometheus alerts FIRING nhanh
            # ──────────────────────────────────────────────────────────────
            - name: ERROR_RATE
              #value: "0"    # CASE A, C, D — Happy path
              value: "0"     # CASE C (Lab 4 Manual) ← ĐANG DÙNG
              #value: "0.2"  # CASE B — Challenge auto-abort (SS-22 → SS-25)
              #value: "0.5"  # Kích Prometheus alerts firing nhanh (SS-26, SS-27)

            # ──────────────────────────────────────────────────────────────
            # VERSION — Hiển thị trong /api/status response
            #   Dùng để verify đúng canary đang chạy sau promote/rollback
            # ──────────────────────────────────────────────────────────────
            - name: VERSION
              #value: "v1"         # Baseline
              #value: "v2"         # CASE A — Auto canary happy path (SS-20, SS-21)
              #value: "v3"         # CASE B — Challenge canary có lỗi (SS-22 → SS-25)
              value: "v4-manual"   # CASE C — Lab 4 manual promote (SS-28, SS-29) ← ĐANG DÙNG
              #value: "v2"         # CASE D — Sau git revert, trở về v2 (SS-34)

            # ──────────────────────────────────────────────────────────────
            # DB credentials — Không đổi, lấy từ Secret
            # ──────────────────────────────────────────────────────────────
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_HOST
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_PASSWORD

          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

  # ══════════════════════════════════════════════════════════════════════════
  # STRATEGY — Canary Steps
  # ══════════════════════════════════════════════════════════════════════════
  strategy:
    canary:
      canaryService: backend-preview-service
      stableService: backend-service

      # AnalysisTemplate chạy từ step 1 trở đi để đo success-rate + latency
      analysis:
        templates:
          - templateName: success-rate-analysis
        startingStep: 1
        args:
          - name: namespace
            value: demo

      steps:
        # ════════════════════════════════════════════════════════════════
        # CASE C — Lab 4: MANUAL PROMOTE (SS-28, SS-29)   ← ĐANG DÙNG
        #
        # Workflow:
        #   1. Canary lên 20% → DỪNG VÔ HẠN → chụp SS-28
        #   2. kubectl argo rollouts promote backend -n demo → chụp SS-29
        #   3. Canary lên 50% → DỪNG VÔ HẠN
        #   4. kubectl argo rollouts promote backend -n demo (lần 2)
        #   5. Canary lên 100% → Healthy ✔
        # ════════════════════════════════════════════════════════════════
        - setWeight: 20
        - pause: {}        # ⭐ VÔ HẠN — chờ: kubectl argo rollouts promote backend -n demo
        - setWeight: 50
        - pause: {}        # ⭐ VÔ HẠN — approve lần 2
        - setWeight: 100

        # ════════════════════════════════════════════════════════════════
        # CASE A — Lab 3: AUTO CANARY HAPPY PATH (SS-18 → SS-21)
        #
        # Workflow: 20% → đợi 30s → 50% → đợi 30s → 100% Healthy
        # AnalysisRun: PASS (ERROR_RATE=0, success_rate=100%)
        #
        # Để dùng: comment CASE C ở trên, bỏ comment CASE A dưới đây
        # ════════════════════════════════════════════════════════════════
        #- setWeight: 20
        #- pause: {duration: 30s}   # Auto sau 30s, không cần approve tay
        #- setWeight: 50
        #- pause: {duration: 30s}
        #- setWeight: 100

        # ════════════════════════════════════════════════════════════════
        # CASE B — Lab 3: AUTO-ABORT CHALLENGE (SS-22 → SS-25)
        #
        # Workflow:
        #   - Canary v3 ERROR_RATE=0.2 → 20% traffic
        #   - Chờ 5 phút để AnalysisRun đủ thời gian fail 2 lần
        #   - AnalysisRun FAIL → Rollout tự ABORT → rollback v2
        #
        # Đừng quên: đổi image: w9-api:3 và ERROR_RATE: "0.2" ở trên
        # ════════════════════════════════════════════════════════════════
        #- setWeight: 20
        #- pause: {duration: 5m}    # Đủ thời gian để AnalysisRun fail 2 lần và tự abort
        #- setWeight: 50
        #- pause: {duration: 30s}
        #- setWeight: 100

        # ════════════════════════════════════════════════════════════════
        # CASE D — Lab 5: GIT REVERT ROLLBACK (SS-33, SS-34)
        #
        # Workflow:
        #   1. Đang ở state sau CASE B (v3 aborted, v2 stable)
        #   2. git revert HEAD && git push
        #   3. ArgoCD sync → rollout về v2 → chụp SS-34
        #
        # Steps giống CASE A vì đây là happy path deploy lại v2
        # ════════════════════════════════════════════════════════════════
        #- setWeight: 20
        #- pause: {duration: 30s}
        #- setWeight: 50
        #- pause: {duration: 30s}
        #- setWeight: 100

# ==============================================================================
# QUICK REFERENCE — Lệnh hay dùng
# ==============================================================================
#
# ── Xem trạng thái rollout (realtime): ─────────────────────────────────────
#   kubectl argo rollouts get rollout backend -n demo --watch
#
# ── Approve / Promote thủ công (CASE C): ───────────────────────────────────
#   kubectl argo rollouts promote backend -n demo
#
# ── Abort rollout tại bất kỳ bước nào: ─────────────────────────────────────
#   kubectl argo rollouts abort backend -n demo
#   kubectl argo rollouts undo backend -n demo   # nếu cần undo về revision trước
#
# ── Xem lịch sử revisions (SS-36): ─────────────────────────────────────────
#   kubectl argo rollouts history rollout backend -n demo
#
# ── Xem AnalysisRun đang chạy: ─────────────────────────────────────────────
#   kubectl get analysisrun -n demo
#   kubectl describe analysisrun $(kubectl get analysisrun -n demo -o name | head -1) -n demo
#
# ── Xem metric AnalysisRun (SS-23): ─────────────────────────────────────────
#   kubectl describe analysisrun \
#     $(kubectl get analysisrun -n demo -o name | head -1) -n demo \
#     | grep -A 15 "Metric Results"
#
# ── Apply trực tiếp không qua ArgoCD (debug): ───────────────────────────────
#   kubectl apply -f backend/k8s/rollout.yaml
#
# ── Verify version đang serve (SS-21, SS-25, SS-34): ────────────────────────
#   MINIKUBE_IP=$(minikube ip -p w9)
#   curl http://$MINIKUBE_IP:30080/api/status | python3 -m json.tool
#
# ==============================================================================
