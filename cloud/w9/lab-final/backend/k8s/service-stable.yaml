# ============================================================
# Service: backend-service (STABLE)
# Nhận 100% traffic bình thường
# Argo Rollouts giữ selector này trỏ vào Pods bản stable
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: demo
  labels:
    app: backend
    tier: stable
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30080
