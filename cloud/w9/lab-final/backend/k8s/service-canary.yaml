# ============================================================
# Service: backend-preview-service (CANARY)
# Nhận % traffic của bản mới trong quá trình canary
# Argo Rollouts tự cập nhật selector khi canary step thay đổi
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: backend-preview-service
  namespace: demo
  labels:
    app: backend
    tier: canary
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30081
