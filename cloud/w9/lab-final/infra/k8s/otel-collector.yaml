# ============================================================
# OpenTelemetry Collector
# Thu thập metrics từ app → export cho Prometheus scrape
# Pipeline: receivers → processors → exporters
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  otel-collector-config.yaml: |
    receivers:
      # Nhận data từ app gửi theo chuẩn OTLP
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      # Tự scrape Prometheus metrics của chính collector
      prometheus:
        config:
          scrape_configs:
            - job_name: 'otel-collector'
              static_configs:
                - targets: ['localhost:8888']

    processors:
      # Gộp batch để giảm network calls
      batch:
        timeout: 5s
        send_batch_size: 1024

      # Giới hạn RAM của collector
      memory_limiter:
        check_interval: 1s
        limit_mib: 256
        spike_limit_mib: 64

    exporters:
      # Export metrics sang format Prometheus
      prometheus:
        endpoint: "0.0.0.0:8889"
        namespace: otel

      # Debug logging (tắt ở production)
      logging:
        loglevel: warn

    service:
      pipelines:
        metrics:
          receivers:  [otlp, prometheus]
          processors: [memory_limiter, batch]
          exporters:  [prometheus, logging]
        traces:
          receivers:  [otlp]
          processors: [memory_limiter, batch]
          exporters:  [logging]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: monitoring
  labels:
    app: otel-collector
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.97.0
          args:
            - --config=/etc/otel/otel-collector-config.yaml
          ports:
            - containerPort: 4317   # OTLP gRPC
              name: otlp-grpc
            - containerPort: 4318   # OTLP HTTP
              name: otlp-http
            - containerPort: 8888   # self metrics
              name: metrics-self
            - containerPort: 8889   # Prometheus export
              name: metrics-prom
          volumeMounts:
            - name: config-vol
              mountPath: /etc/otel
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"
      volumes:
        - name: config-vol
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: monitoring
  labels:
    app: otel-collector
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: metrics-prom
      port: 8889
      targetPort: 8889
