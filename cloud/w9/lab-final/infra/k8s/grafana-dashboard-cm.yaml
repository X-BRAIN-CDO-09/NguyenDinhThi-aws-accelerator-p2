# ============================================================
# ConfigMap: grafana-dashboard-cm
# Chứa file JSON Dashboard của Grafana cho Backend Application
# Grafana sidecar tự động quét và load dashboard này nhờ label:
#   grafana_dashboard: "1"
#
# Gap 3: Thêm 3 panels mới:
#   - Error Budget Remaining % (Gauge burndown)
#   - Burn Rate Timeline (14.4x và 6x threshold lines)
#   - Canary vs Stable Error Rate + Traffic Split (Gap 6)
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-dashboard-cm
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  backend-dashboard.json: |
    {
      "annotations": { "list": [{ "builtIn": 1, "datasource": "-- Grafana --", "enable": true, "hide": true, "name": "Annotations & Alerts", "type": "dashboard" }] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [

        { "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 }, "id": 1, "title": "🔴 Application RED Metrics (Rate, Errors, Duration)", "type": "row" },

        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "custom": { "drawStyle": "line", "fillOpacity": 15, "lineInterpolation": "smooth", "lineWidth": 2, "showPoints": "auto", "spanNulls": false }, "mappings": [], "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] } }, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 1 }, "id": 2,
          "options": { "legend": { "calcs": [], "displayMode": "list", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [{ "datasource": { "type": "prometheus", "uid": "prometheus" }, "editorMode": "code", "expr": "sum(rate(flask_http_request_total{namespace=\"demo\"}[1m])) by (status)", "legendFormat": "HTTP {{status}}", "range": true, "refId": "A" }],
          "title": "Request Rate (req/s by status)", "type": "timeseries"
        },

        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "custom": { "drawStyle": "line", "fillOpacity": 20, "lineInterpolation": "smooth", "lineWidth": 2, "showPoints": "auto" }, "mappings": [], "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 2 }, { "color": "red", "value": 5 }] }, "unit": "percent" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 1 }, "id": 3,
          "options": { "legend": { "calcs": ["last", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "single", "sort": "none" } },
          "targets": [{ "datasource": { "type": "prometheus", "uid": "prometheus" }, "editorMode": "code", "expr": "sum(rate(flask_http_request_total{status=~\"5..\", namespace=\"demo\"}[5m])) / sum(rate(flask_http_request_total{namespace=\"demo\"}[5m])) * 100", "legendFormat": "Error Rate %", "range": true, "refId": "A" }],
          "title": "Error Rate 5xx (%)", "type": "timeseries"
        },

        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "custom": { "drawStyle": "line", "fillOpacity": 10, "lineInterpolation": "smooth", "lineWidth": 2, "showPoints": "auto" }, "mappings": [], "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 0.5 }] }, "unit": "s" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 1 }, "id": 4,
          "options": { "legend": { "calcs": ["last", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "editorMode": "code", "expr": "histogram_quantile(0.95, sum(rate(flask_http_request_duration_seconds_bucket{namespace=\"demo\"}[5m])) by (le))", "legendFormat": "p95 Latency", "range": true, "refId": "A" },
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "editorMode": "code", "expr": "histogram_quantile(0.99, sum(rate(flask_http_request_duration_seconds_bucket{namespace=\"demo\"}[5m])) by (le))", "legendFormat": "p99 Latency (abort if >500ms)", "range": true, "refId": "B" }
          ],
          "title": "Latency p95 & p99 — Canary abort if p99 > 500ms", "type": "timeseries"
        },

        { "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 9 }, "id": 5, "title": "📊 SLO Observability — Slide Chiều", "type": "row" },

        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "mappings": [], "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 99.5 }] }, "unit": "percent", "min": 98, "max": 100 }, "overrides": [] },
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 10 }, "id": 6,
          "options": { "colorMode": "background", "graphMode": "area", "justifyMode": "center", "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [{ "datasource": { "type": "prometheus", "uid": "prometheus" }, "editorMode": "code", "expr": "(1 - (sum(rate(flask_http_request_total{status=~\"5..\", namespace=\"demo\"}[30d])) or vector(0)) / (sum(rate(flask_http_request_total{namespace=\"demo\"}[30d])) or vector(1))) * 100", "legendFormat": "SLI Availability", "range": false, "instant": true, "refId": "A" }],
          "title": "SLI Availability 30d (SLO: 99.5%)", "type": "stat"
        },

        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "mappings": [], "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "yellow", "value": 20 }, { "color": "green", "value": 50 }] }, "unit": "percent", "min": 0, "max": 100 }, "overrides": [] },
          "gridPos": { "h": 6, "w": 6, "x": 6, "y": 10 }, "id": 7,
          "options": { "colorMode": "background", "graphMode": "area", "justifyMode": "center", "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [{ "datasource": { "type": "prometheus", "uid": "prometheus" }, "editorMode": "code", "expr": "sum(rate(flask_http_request_total{status!~\"5..\", namespace=\"demo\"}[5m])) / sum(rate(flask_http_request_total{namespace=\"demo\"}[5m])) * 100", "legendFormat": "Canary Success Rate", "range": false, "instant": true, "refId": "A" }],
          "title": "Canary Success Rate (5m)", "type": "stat"
        },

        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "SLO=99.5% → Budget=0.5%. Green: >50% remaining. Yellow: 20-50%. Red: <20% (DANGER!)",
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "mappings": [{ "options": { "from": 0.5, "to": 1.0, "result": { "color": "green", "text": "Budget OK ✅" } }, "type": "range" }, { "options": { "from": 0.2, "to": 0.5, "result": { "color": "yellow", "text": "Budget Low ⚠️" } }, "type": "range" }, { "options": { "from": -999, "to": 0.2, "result": { "color": "red", "text": "Budget CRITICAL 🔥" } }, "type": "range" }], "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "yellow", "value": 0.2 }, { "color": "green", "value": 0.5 }] }, "unit": "percentunit", "min": 0, "max": 1 }, "overrides": [] },
          "gridPos": { "h": 6, "w": 6, "x": 12, "y": 10 }, "id": 8,
          "options": { "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "showThresholdLabels": true, "showThresholdMarkers": true },
          "targets": [{ "datasource": { "type": "prometheus", "uid": "prometheus" }, "editorMode": "code", "expr": "clamp_min(1 - ((1 - sum(rate(flask_http_request_total{namespace=\"demo\",status!~\"5..\"}[30d])) / sum(rate(flask_http_request_total{namespace=\"demo\"}[30d]))) / 0.005), 0)", "legendFormat": "Error Budget Remaining", "range": false, "instant": true, "refId": "A" }],
          "title": "🏦 Error Budget Remaining (Gap 3)", "type": "gauge"
        },

        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Burn Rate = actual_error_rate / error_budget_rate. >14.4x → budget hết trong 2 ngày (CRITICAL). >6x → 5 ngày (WARNING).",
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "mappings": [], "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 6 }, { "color": "red", "value": 14.4 }] }, "unit": "short" }, "overrides": [] },
          "gridPos": { "h": 6, "w": 6, "x": 18, "y": 10 }, "id": 9,
          "options": { "colorMode": "background", "graphMode": "area", "justifyMode": "center", "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "value_and_name" },
          "targets": [{ "datasource": { "type": "prometheus", "uid": "prometheus" }, "editorMode": "code", "expr": "sum(rate(flask_http_request_total{namespace=\"demo\",status=~\"5..\"}[1h])) / sum(rate(flask_http_request_total{namespace=\"demo\"}[1h])) / 0.005", "legendFormat": "Current Burn Rate", "range": false, "instant": true, "refId": "A" }],
          "title": "⚡ Burn Rate (>14.4=CRITICAL, >6=WARNING)", "type": "stat"
        },

        { "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 16 }, "id": 10, "title": "🕯️ Burn Rate Timeline & Error Budget Burndown (Gap 3)", "type": "row" },

        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "custom": { "drawStyle": "line", "fillOpacity": 0, "lineInterpolation": "smooth", "lineWidth": 2, "showPoints": "never" }, "mappings": [], "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] }, "unit": "short" },
            "overrides": [
              { "matcher": { "id": "byName", "options": "Fast Burn Threshold (14.4x)" }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }, { "id": "custom.lineStyle", "value": { "dash": [10, 5], "fill": "dash" } }, { "id": "custom.lineWidth", "value": 1 }] },
              { "matcher": { "id": "byName", "options": "Slow Burn Threshold (6x)" }, "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }, { "id": "custom.lineStyle", "value": { "dash": [10, 5], "fill": "dash" } }, { "id": "custom.lineWidth", "value": 1 }] }
            ]
          },
          "gridPos": { "h": 8, "w": 14, "x": 0, "y": 17 }, "id": 11,
          "options": { "legend": { "calcs": ["last", "max"], "displayMode": "table", "placement": "right", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "editorMode": "code", "expr": "sum(rate(flask_http_request_total{namespace=\"demo\",status=~\"5..\"}[1h])) / sum(rate(flask_http_request_total{namespace=\"demo\"}[1h])) / 0.005", "legendFormat": "Burn Rate (1h window)", "range": true, "refId": "A" },
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "editorMode": "code", "expr": "sum(rate(flask_http_request_total{namespace=\"demo\",status=~\"5..\"}[5m])) / sum(rate(flask_http_request_total{namespace=\"demo\"}[5m])) / 0.005", "legendFormat": "Burn Rate (5m window)", "range": true, "refId": "B" },
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "editorMode": "code", "expr": "vector(14.4)", "legendFormat": "Fast Burn Threshold (14.4x)", "range": true, "refId": "C" },
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "editorMode": "code", "expr": "vector(6)", "legendFormat": "Slow Burn Threshold (6x)", "range": true, "refId": "D" }
          ],
          "title": "Burn Rate Timeline (14.4x & 6x Thresholds)", "type": "timeseries"
        },

        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "custom": { "drawStyle": "line", "fillOpacity": 10, "lineInterpolation": "smooth", "lineWidth": 2, "showPoints": "never" }, "mappings": [], "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] }, "unit": "percentunit", "min": 0, "max": 1 }, "overrides": [] },
          "gridPos": { "h": 8, "w": 10, "x": 14, "y": 17 }, "id": 12,
          "options": { "legend": { "calcs": ["last", "min"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "asc" } },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "editorMode": "code", "expr": "clamp_min(1 - ((1 - sum(rate(flask_http_request_total{namespace=\"demo\",status!~\"5..\"}[30d])) / sum(rate(flask_http_request_total{namespace=\"demo\"}[30d]))) / 0.005), 0)", "legendFormat": "Error Budget Remaining", "range": true, "refId": "A" },
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "editorMode": "code", "expr": "vector(0)", "legendFormat": "Budget Exhausted Line", "range": true, "refId": "B" }
          ],
          "title": "Error Budget Burndown — 1.0=full 0=exhausted", "type": "timeseries"
        },

        { "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 25 }, "id": 13, "title": "🚀 Canary vs Stable Traffic Split (Gap 6)", "type": "row" },

        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "custom": { "drawStyle": "line", "fillOpacity": 15, "lineInterpolation": "smooth", "lineWidth": 2, "showPoints": "auto" }, "mappings": [], "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 5 }] }, "unit": "percent" },
            "overrides": [
              { "matcher": { "id": "byName", "options": "Canary Error Rate %" }, "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "Stable Error Rate %" }, "properties": [{ "id": "color", "value": { "fixedColor": "blue", "mode": "fixed" } }] }
            ]
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 26 }, "id": 14,
          "options": { "legend": { "calcs": ["last", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "editorMode": "code", "expr": "sum(rate(flask_http_request_total{namespace=\"demo\",status=~\"5..\",service=\"backend-service\"}[5m])) / sum(rate(flask_http_request_total{namespace=\"demo\",service=\"backend-service\"}[5m])) * 100 or vector(0)", "legendFormat": "Stable Error Rate %", "range": true, "refId": "A" },
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "editorMode": "code", "expr": "sum(rate(flask_http_request_total{namespace=\"demo\",status=~\"5..\",service=\"backend-preview-service\"}[5m])) / sum(rate(flask_http_request_total{namespace=\"demo\",service=\"backend-preview-service\"}[5m])) * 100 or vector(0)", "legendFormat": "Canary Error Rate %", "range": true, "refId": "B" }
          ],
          "title": "Canary vs Stable Error Rate (Split by Service)", "type": "timeseries"
        },

        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "custom": { "drawStyle": "bars", "fillOpacity": 80, "lineInterpolation": "linear", "lineWidth": 1, "showPoints": "never" }, "mappings": [], "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] }, "unit": "reqps" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 26 }, "id": 15,
          "options": { "legend": { "calcs": ["last"], "displayMode": "list", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "editorMode": "code", "expr": "sum(rate(flask_http_request_total{namespace=\"demo\",service=\"backend-service\"}[1m])) or vector(0)", "legendFormat": "Stable (req/s)", "range": true, "refId": "A" },
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "editorMode": "code", "expr": "sum(rate(flask_http_request_total{namespace=\"demo\",service=\"backend-preview-service\"}[1m])) or vector(0)", "legendFormat": "Canary (req/s)", "range": true, "refId": "B" }
          ],
          "title": "Traffic Volume: Stable vs Canary (req/s)", "type": "timeseries"
        }

      ],
      "refresh": "10s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["w9", "kubernetes", "prometheus", "canary", "slo"],
      "templates": [],
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": { "refresh_intervals": ["5s", "10s", "30s"] },
      "timezone": "",
      "title": "W9 Lab Final Dashboard — SLO + Canary",
      "version": 2
    }
