# ============================================================
# Service: frontend-service
# NodePort 30090 — truy cập dashboard UI từ bên ngoài cluster
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: demo
  labels:
    app: frontend
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30090
