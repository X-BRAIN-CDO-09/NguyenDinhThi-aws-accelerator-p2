# ============================================================
# ConfigMap: frontend-config
# Chứa toàn bộ HTML/CSS/JS của dashboard UI
# Bao gồm: dark/light mode toggle, auto-refresh, status cards
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: demo
  labels:
    app: frontend
  annotations:
    argocd.argoproj.io/sync-wave: "2"
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="vi" data-theme="dark">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>W9 Lab Final — Ship Smartly Dashboard</title>
      <meta name="description" content="GitOps + Observability + Canary Delivery Dashboard - W9 Lab Final" />
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
      <style>
        /* ===== CSS Variables: Dark / Light Theme ===== */
        :root[data-theme="dark"] {
          --bg-primary:    #0f172a;
          --bg-secondary:  #1e293b;
          --bg-card:       #1e293b;
          --bg-card-hover: #293548;
          --border:        rgba(255,255,255,0.08);
          --text-primary:  #f1f5f9;
          --text-secondary:#94a3b8;
          --text-muted:    #64748b;
          --accent:        #f59e0b;
          --accent2:       #fb923c;
          --success:       #22c55e;
          --danger:        #ef4444;
          --info:          #3b82f6;
          --purple:        #8b5cf6;
          --gradient:      linear-gradient(135deg, #f59e0b, #ef4444);
          --shadow:        0 4px 24px rgba(0,0,0,0.4);
          --glow-accent:   0 0 20px rgba(245,158,11,0.3);
        }
        :root[data-theme="light"] {
          --bg-primary:    #f8fafc;
          --bg-secondary:  #ffffff;
          --bg-card:       #ffffff;
          --bg-card-hover: #f1f5f9;
          --border:        rgba(0,0,0,0.08);
          --text-primary:  #0f172a;
          --text-secondary:#475569;
          --text-muted:    #94a3b8;
          --accent:        #d97706;
          --accent2:       #ea580c;
          --success:       #16a34a;
          --danger:        #dc2626;
          --info:          #2563eb;
          --purple:        #7c3aed;
          --gradient:      linear-gradient(135deg, #d97706, #dc2626);
          --shadow:        0 4px 24px rgba(0,0,0,0.08);
          --glow-accent:   0 0 20px rgba(217,119,6,0.15);
        }

        /* ===== Reset & Base ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 16px; }
        body {
          font-family: 'Inter', sans-serif;
          background: var(--bg-primary);
          color: var(--text-primary);
          min-height: 100vh;
          line-height: 1.5;
          -webkit-font-smoothing: antialiased;
          transition: background 0.3s ease, color 0.3s ease;
        }

        /* ===== Top Navigation ===== */
        .navbar {
          position: sticky; top: 0; z-index: 100;
          background: var(--bg-secondary);
          border-bottom: 1px solid var(--border);
          padding: 0 24px;
          height: 60px;
          display: flex; align-items: center; justify-content: space-between;
          backdrop-filter: blur(12px);
          box-shadow: var(--shadow);
        }
        .nav-brand {
          display: flex; align-items: center; gap: 12px;
          font-weight: 800; font-size: 1.1rem;
        }
        .nav-logo {
          width: 32px; height: 32px;
          background: var(--gradient);
          border-radius: 8px;
          display: flex; align-items: center; justify-content: center;
          font-size: 1rem; color: #fff;
        }
        .nav-badge {
          font-size: 0.65rem; font-weight: 700;
          padding: 2px 8px; border-radius: 4px;
          background: rgba(245,158,11,0.15);
          color: var(--accent);
          letter-spacing: 0.05em; text-transform: uppercase;
        }
        .nav-actions { display: flex; align-items: center; gap: 12px; }
        .refresh-btn, .theme-btn {
          padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border);
          background: var(--bg-card); color: var(--text-secondary);
          font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 600;
          cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px;
        }
        .refresh-btn:hover, .theme-btn:hover {
          background: var(--bg-card-hover); color: var(--text-primary);
          border-color: var(--accent);
        }
        .refresh-indicator {
          width: 8px; height: 8px; border-radius: 50%;
          background: var(--success); animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        /* ===== Hero Banner ===== */
        .hero {
          background: var(--bg-secondary);
          border-bottom: 1px solid var(--border);
          padding: 32px 24px;
          text-align: center;
          position: relative; overflow: hidden;
        }
        .hero::before {
          content: ''; position: absolute;
          top: -50%; right: -20%; width: 60%; height: 200%;
          background: radial-gradient(circle, rgba(245,158,11,0.08) 0%, transparent 60%);
          pointer-events: none;
        }
        .hero::after {
          content: ''; position: absolute;
          bottom: -50%; left: -20%; width: 50%; height: 200%;
          background: radial-gradient(circle, rgba(59,130,246,0.06) 0%, transparent 60%);
          pointer-events: none;
        }
        .hero h1 {
          font-size: clamp(1.5rem, 3vw, 2.2rem);
          font-weight: 800; letter-spacing: -0.03em;
          background: var(--gradient);
          -webkit-background-clip: text; -webkit-text-fill-color: transparent;
          background-clip: text;
          margin-bottom: 8px;
        }
        .hero p { color: var(--text-secondary); font-size: 0.95rem; }
        .pipeline-flow {
          display: flex; align-items: center; justify-content: center;
          gap: 0; margin-top: 20px; flex-wrap: wrap;
        }
        .flow-step {
          padding: 8px 16px; border-radius: 8px;
          border: 1px solid var(--border);
          background: var(--bg-card);
          font-size: 0.8rem; font-weight: 700;
          display: flex; align-items: center; gap: 6px;
        }
        .flow-arrow { color: var(--accent); font-size: 1.1rem; padding: 0 6px; }

        /* ===== Main Layout ===== */
        .main { max-width: 1200px; margin: 0 auto; padding: 24px; }

        /* ===== Stats Row ===== */
        .stats-grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
          gap: 16px; margin-bottom: 24px;
        }
        .stat-card {
          background: var(--bg-card);
          border: 1px solid var(--border);
          border-radius: 12px; padding: 20px;
          transition: all 0.3s; cursor: default;
          position: relative; overflow: hidden;
        }
        .stat-card::before {
          content: ''; position: absolute;
          top: 0; left: 0; right: 0; height: 3px;
        }
        .stat-card.green::before  { background: var(--success); }
        .stat-card.amber::before  { background: var(--accent); }
        .stat-card.red::before    { background: var(--danger); }
        .stat-card.blue::before   { background: var(--info); }
        .stat-card.purple::before { background: var(--purple); }
        .stat-card:hover { transform: translateY(-2px); box-shadow: var(--glow-accent); }
        .stat-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 8px; }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 2rem; font-weight: 700; line-height: 1; }
        .stat-value.green  { color: var(--success); }
        .stat-value.amber  { color: var(--accent); }
        .stat-value.red    { color: var(--danger); }
        .stat-value.blue   { color: var(--info); }
        .stat-value.purple { color: var(--purple); }
        .stat-sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }

        /* ===== Cards Grid ===== */
        .cards-grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
          gap: 16px; margin-bottom: 24px;
        }
        .card {
          background: var(--bg-card);
          border: 1px solid var(--border);
          border-radius: 12px; padding: 20px;
          transition: all 0.3s;
        }
        .card:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
        .card-header {
          display: flex; align-items: center; justify-content: space-between;
          margin-bottom: 16px;
        }
        .card-title {
          font-size: 0.85rem; font-weight: 700;
          color: var(--text-secondary); text-transform: uppercase;
          letter-spacing: 0.05em; display: flex; align-items: center; gap: 8px;
        }
        .status-dot {
          width: 8px; height: 8px; border-radius: 50%;
          display: inline-block;
        }
        .dot-green  { background: var(--success); box-shadow: 0 0 6px var(--success); animation: pulse 2s infinite; }
        .dot-amber  { background: var(--accent);  box-shadow: 0 0 6px var(--accent); animation: pulse 1.5s infinite; }
        .dot-red    { background: var(--danger);  box-shadow: 0 0 6px var(--danger); animation: pulse 1s infinite; }
        .dot-grey   { background: var(--text-muted); }

        /* ===== Service Items ===== */
        .service-item {
          display: flex; align-items: center; justify-content: space-between;
          padding: 10px 0; border-bottom: 1px solid var(--border);
        }
        .service-item:last-child { border-bottom: none; }
        .service-name { font-size: 0.88rem; font-weight: 600; }
        .service-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
        .service-badge {
          font-size: 0.7rem; font-weight: 700; padding: 3px 10px; border-radius: 6px;
          font-family: 'JetBrains Mono', monospace;
        }
        .badge-healthy  { background: rgba(34,197,94,0.15);  color: var(--success); }
        .badge-canary   { background: rgba(245,158,11,0.15); color: var(--accent); }
        .badge-degraded { background: rgba(239,68,68,0.15);  color: var(--danger); }
        .badge-unknown  { background: rgba(100,116,139,0.15);color: var(--text-muted); }

        /* ===== Canary Progress ===== */
        .canary-progress { margin-top: 12px; }
        .progress-label {
          display: flex; justify-content: space-between;
          font-size: 0.78rem; color: var(--text-secondary); margin-bottom: 6px;
        }
        .progress-bar-wrap {
          height: 8px; border-radius: 4px;
          background: var(--border); overflow: hidden;
        }
        .progress-bar-fill {
          height: 100%; border-radius: 4px;
          background: var(--gradient);
          transition: width 0.5s ease;
        }

        /* ===== Code Block ===== */
        .code-block {
          background: #0f172a; border: 1px solid rgba(245,158,11,0.2);
          border-radius: 8px; padding: 12px 14px;
          font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
          color: #e2e8f0; line-height: 1.6; overflow-x: auto;
        }
        .code-block .kw  { color: #f59e0b; }
        .code-block .str { color: #34d399; }
        .code-block .cmt { color: #64748b; }

        /* ===== Alert Banner ===== */
        .alert-banner {
          border-radius: 10px; padding: 12px 16px; margin-bottom: 16px;
          font-size: 0.84rem; display: flex; align-items: center; gap: 10px;
          border: 1px solid;
        }
        .alert-info    { background: rgba(59,130,246,0.08);  border-color: rgba(59,130,246,0.3);  color: var(--info); }
        .alert-success { background: rgba(34,197,94,0.08);   border-color: rgba(34,197,94,0.3);   color: var(--success); }
        .alert-warning { background: rgba(245,158,11,0.08);  border-color: rgba(245,158,11,0.3);  color: var(--accent); }
        .alert-danger  { background: rgba(239,68,68,0.08);   border-color: rgba(239,68,68,0.3);   color: var(--danger); }

        /* ===== Table ===== */
        table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
        th {
          text-align: left; padding: 8px 12px;
          background: rgba(245,158,11,0.05);
          color: var(--accent); font-weight: 700; font-size: 0.7rem;
          text-transform: uppercase; letter-spacing: 0.06em;
          border-bottom: 1px solid var(--border);
        }
        td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--text-secondary); }
        tr:hover td { background: rgba(255,255,255,0.02); }
        code {
          font-family: 'JetBrains Mono', monospace; font-size: 0.8em;
          background: rgba(245,158,11,0.1); color: var(--accent);
          padding: 2px 6px; border-radius: 4px;
        }

        /* ===== Footer ===== */
        .footer {
          text-align: center; padding: 24px;
          color: var(--text-muted); font-size: 0.78rem;
          border-top: 1px solid var(--border); margin-top: 24px;
        }

        /* ===== Responsive ===== */
        @media (max-width: 640px) {
          .pipeline-flow { flex-direction: column; }
          .flow-arrow { transform: rotate(90deg); }
          .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
      </style>
    </head>
    <body>
      <!-- Navbar -->
      <nav class="navbar">
        <div class="nav-brand">
          <div class="nav-logo">🚀</div>
          <span>W9 Lab Final</span>
          <span class="nav-badge">Ship Smartly</span>
        </div>
        <div class="nav-actions">
          <button class="refresh-btn" id="refreshBtn" onclick="fetchStatus()">
            <div class="refresh-indicator" id="refreshDot"></div>
            Auto-refresh
          </button>
          <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">
            🌙 Dark Mode
          </button>
        </div>
      </nav>

      <!-- Hero -->
      <div class="hero">
        <h1>GitOps + Observability + Canary</h1>
        <p>Buổi sáng: ArgoCD App-of-Apps &nbsp;·&nbsp; Buổi chiều: SLO/Burn-Rate + Canary Auto-Abort</p>
        <div class="pipeline-flow">
          <div class="flow-step" style="border-color:var(--info);color:var(--info)">
            <span>📦</span> git push
          </div>
          <div class="flow-arrow">→</div>
          <div class="flow-step" style="border-color:var(--success);color:var(--success)">
            <span>🔄</span> ArgoCD Sync
          </div>
          <div class="flow-arrow">→</div>
          <div class="flow-step" style="border-color:var(--accent);color:var(--accent)">
            <span>📊</span> SLO Chấm
          </div>
          <div class="flow-arrow">→</div>
          <div class="flow-step" style="border-color:var(--success);color:var(--success)">
            <span>✅</span> Canary 100%
          </div>
          <div class="flow-arrow" style="color:var(--danger)">or</div>
          <div class="flow-step" style="border-color:var(--danger);color:var(--danger)">
            <span>🛑</span> Auto-Abort
          </div>
        </div>
      </div>

      <!-- Main Content -->
      <div class="main">

        <!-- Stats Row -->
        <div class="stats-grid" id="statsGrid">
          <div class="stat-card green">
            <div class="stat-label">SLI Availability</div>
            <div class="stat-value green" id="statSLI">—</div>
            <div class="stat-sub">SLO target: 99.5%</div>
          </div>
          <div class="stat-card amber">
            <div class="stat-label">Error Budget</div>
            <div class="stat-value amber" id="statBudget">—</div>
            <div class="stat-sub">remaining this month</div>
          </div>
          <div class="stat-card blue">
            <div class="stat-label">Backend Version</div>
            <div class="stat-value blue" id="statVersion">—</div>
            <div class="stat-sub" id="statVersionSub">stable</div>
          </div>
          <div class="stat-card purple">
            <div class="stat-label">Canary Traffic</div>
            <div class="stat-value purple" id="statCanary">0%</div>
            <div class="stat-sub" id="statCanarySub">no rollout active</div>
          </div>
          <div class="stat-card red">
            <div class="stat-label">Error Rate</div>
            <div class="stat-value red" id="statError">—</div>
            <div class="stat-sub">5xx / total requests</div>
          </div>
        </div>

        <!-- Cards Row -->
        <div class="cards-grid">
          <!-- Services Status -->
          <div class="card">
            <div class="card-header">
              <div class="card-title">
                <span class="status-dot dot-green"></span>
                Services Status
              </div>
              <span style="font-size:0.7rem;color:var(--text-muted)" id="lastUpdate">—</span>
            </div>
            <div id="servicesList">
              <div class="service-item">
                <div>
                  <div class="service-name">Backend API</div>
                  <div class="service-meta">:30080 (stable) · :30081 (canary)</div>
                </div>
                <span class="service-badge badge-unknown" id="backendStatus">Checking...</span>
              </div>
              <div class="service-item">
                <div>
                  <div class="service-name">Prometheus</div>
                  <div class="service-meta">monitoring namespace · :9090</div>
                </div>
                <span class="service-badge badge-unknown" id="prometheusStatus">Unknown</span>
              </div>
              <div class="service-item">
                <div>
                  <div class="service-name">Grafana</div>
                  <div class="service-meta">admin / admin123</div>
                </div>
                <span class="service-badge badge-unknown" id="grafanaStatus">Unknown</span>
              </div>
              <div class="service-item">
                <div>
                  <div class="service-name">ArgoCD</div>
                  <div class="service-meta">App-of-Apps · root synced</div>
                </div>
                <span class="service-badge badge-healthy">Synced</span>
              </div>
              <div class="service-item">
                <div>
                  <div class="service-name">Argo Rollouts</div>
                  <div class="service-meta">argo-rollouts namespace</div>
                </div>
                <span class="service-badge badge-healthy">Running</span>
              </div>
            </div>
          </div>

          <!-- Canary Rollout -->
          <div class="card">
            <div class="card-header">
              <div class="card-title">
                <span>🐤</span> Canary Rollout Progress
              </div>
            </div>
            <div id="rolloutStatus">
              <div class="alert-banner alert-info">
                <span>ℹ️</span>
                <span>No active rollout. Deploy v2 to start canary.</span>
              </div>
            </div>
            <div class="canary-progress" id="canaryProgress" style="display:none">
              <div class="progress-label">
                <span>Stable (v1)</span>
                <span id="canaryPct">0%</span>
                <span>Canary (v2)</span>
              </div>
              <div class="progress-bar-wrap">
                <div class="progress-bar-fill" id="canaryBar" style="width:0%"></div>
              </div>
            </div>

            <div style="margin-top:16px;">
              <div class="card-title" style="margin-bottom:10px;"><span>🎮</span> Commands</div>
              <div class="code-block">
<span class="cmt"># Trigger canary (change VERSION v1→v2)</span>
<span class="kw">kubectl</span> argo rollouts get rollout backend \
  -n demo --watch

<span class="cmt"># Promote (nếu dùng pause: {} )</span>
<span class="kw">kubectl</span> argo rollouts promote backend -n demo

<span class="cmt"># Force abort</span>
<span class="kw">kubectl</span> argo rollouts abort backend -n demo
              </div>
            </div>
          </div>

          <!-- SLO Info -->
          <div class="card">
            <div class="card-header">
              <div class="card-title"><span>📊</span> SLO / Burn Rate</div>
            </div>
            <table>
              <thead>
                <tr><th>Alert</th><th>Window</th><th>Threshold</th><th>Severity</th></tr>
              </thead>
              <tbody>
                <tr>
                  <td>Fast Burn</td>
                  <td><code>1h × 5m</code></td>
                  <td>Burn rate > 14.4×</td>
                  <td><span class="service-badge badge-degraded">CRITICAL</span></td>
                </tr>
                <tr>
                  <td>Slow Burn</td>
                  <td><code>6h × 30m</code></td>
                  <td>Burn rate > 6×</td>
                  <td><span class="service-badge badge-canary">WARNING</span></td>
                </tr>
              </tbody>
            </table>
            <div style="margin-top:14px;">
              <div class="code-block">
<span class="cmt"># SLO: 99.5% availability / 30 ngày</span>
Error budget = 0.5% × 43200 min
             = <span class="kw">216 phút/tháng</span>

<span class="cmt"># Inject error để test alert:</span>
<span class="str">ERROR_RATE=0.2</span> → 20% lỗi
<span class="kw">→</span> Burn rate ~14.4× → alert fires!
              </div>
            </div>
          </div>

          <!-- Lab Steps -->
          <div class="card">
            <div class="card-header">
              <div class="card-title"><span>🧪</span> Lab Steps — Challenge Checklist</div>
            </div>
            <div id="checklist">
              <div class="service-item">
                <div>
                  <div class="service-name">1. GitOps: mọi thay đổi qua Git</div>
                  <div class="service-meta">ArgoCD Synced · không kubectl tay</div>
                </div>
                <span class="service-badge badge-healthy">✓</span>
              </div>
              <div class="service-item">
                <div>
                  <div class="service-name">2. Rollback: git revert &lt; 5 phút</div>
                  <div class="service-meta">git revert HEAD &amp;&amp; git push</div>
                </div>
                <span class="service-badge badge-unknown" id="check2">Pending</span>
              </div>
              <div class="service-item">
                <div>
                  <div class="service-name">3. SLO + Alert fires về email</div>
                  <div class="service-meta">inject ERROR_RATE=0.2 → alert</div>
                </div>
                <span class="service-badge badge-unknown" id="check3">Pending</span>
              </div>
              <div class="service-item">
                <div>
                  <div class="service-name">4. Canary bản lỗi tự abort ⭐</div>
                  <div class="service-meta">AnalysisTemplate → success_rate &lt; 95% → ABORT</div>
                </div>
                <span class="service-badge badge-unknown" id="check4">Pending</span>
              </div>
            </div>
          </div>
        </div>

      </div>

      <!-- Footer -->
      <div class="footer">
        W9 Lab Final · GitOps + Observability + Canary Delivery · <strong>Ship Smartly</strong>
        <br>Backend: <code>:30080</code> · Frontend: <code>:30090</code> · ArgoCD: <code>:32080</code>
      </div>

      <script>
        // ===== Theme Toggle =====
        const html = document.documentElement;
        const themeBtn = document.getElementById('themeBtn');
        const savedTheme = localStorage.getItem('theme') || 'dark';
        setTheme(savedTheme);

        function setTheme(t) {
          html.setAttribute('data-theme', t);
          themeBtn.textContent = t === 'dark' ? '☀️ Light Mode' : '🌙 Dark Mode';
          localStorage.setItem('theme', t);
        }
        function toggleTheme() {
          setTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        // ===== Fetch Backend Status =====
        async function fetchStatus() {
          const dot = document.getElementById('refreshDot');
          dot.style.background = 'var(--accent)';

          try {
            const res = await fetch('/api/status', { signal: AbortSignal.timeout(3000) });
            if (res.ok) {
              const data = await res.json();
              updateUI(data);
              document.getElementById('backendStatus').textContent = 'Healthy';
              document.getElementById('backendStatus').className = 'service-badge badge-healthy';
              dot.style.background = 'var(--success)';
            }
          } catch (e) {
            document.getElementById('backendStatus').textContent = 'Checking...';
            document.getElementById('backendStatus').className = 'service-badge badge-unknown';
            dot.style.background = 'var(--danger)';
            // Use mock data when backend not reachable
            updateUI({ version: 'v1', error_rate: 0, status: 'healthy' });
          }

          document.getElementById('lastUpdate').textContent =
            new Date().toLocaleTimeString('vi-VN');
        }

        function updateUI(data) {
          document.getElementById('statVersion').textContent = data.version || 'v1';
          const errPct = ((data.error_rate || 0) * 100).toFixed(1);
          document.getElementById('statError').textContent = errPct + '%';

          // SLI mock (would come from Prometheus in real setup)
          const sli = (100 - parseFloat(errPct)).toFixed(2);
          document.getElementById('statSLI').textContent = sli + '%';
          document.getElementById('statBudget').textContent =
            parseFloat(sli) >= 99.5 ? '100%' : Math.max(0, ((parseFloat(sli) - 99.0) / 0.5 * 100)).toFixed(0) + '%';
        }

        // Auto-refresh every 10 seconds
        fetchStatus();
        setInterval(fetchStatus, 10000);
      </script>
    </body>
    </html>
