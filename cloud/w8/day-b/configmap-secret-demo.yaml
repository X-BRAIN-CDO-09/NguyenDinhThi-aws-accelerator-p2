apiVersion: v1
kind: ConfigMap
metadata:
  name: app-configmap
  namespace: default
data:
  database_url: "jdbc:mysql://mysql-service:3306/db_staging"
  app_features: "signup=true,payment=false,darkmode=true"
  server_timeout: "30s"

---

apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: default
type: Opaque
data:
  # Các giá trị phải được mã hóa Base64
  # echo -n "admin_user" | base64 -> YWRtaW5fdXNlcg==
  # echo -n "SuperSecretP@ssw0rd!" | base64 -> U3VwZXJTZWNyZXRQQHNzdzByZCE=
  db_user: YWRtaW5fdXNlcg==
  db_pass: U3VwZXJTZWNyZXRQQHNzdzByZCE=

---

apiVersion: v1
kind: Pod
metadata:
  name: config-test-pod
  namespace: default
  labels:
    app: config-test
spec:
  containers:
    - name: app-container
      image: alpine:3.18
      command: ["/bin/sh", "-c"]
      args:
        - |
          echo "=== K8s ConfigMap & Secret Mount Demo ==="
          echo "Database URL: $DB_URL"
          echo "Database User: $DB_USER"
          echo "Database Password: $DB_PASSWORD"
          echo "=== Reading mounted file config ==="
          cat /etc/config/app_features
          echo ""
          # Treo container để giữ Pod ở trạng thái Running
          sleep 3600
          
      # 1. Inject ConfigMap & Secret làm Biến Môi Trường (Env Variables)
      env:
        - name: DB_URL
          valueFrom:
            configMapKeyRef:
              name: app-configmap
              key: database_url
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: db_user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: db_pass
              
      # 2. Mount ConfigMap làm file trong thư mục
      volumeMounts:
        - name: config-volume
          mountPath: /etc/config
          readOnly: true
          
  volumes:
    - name: config-volume
      configMap:
        name: app-configmap
        items:
          - key: app-features
            path: app_features
