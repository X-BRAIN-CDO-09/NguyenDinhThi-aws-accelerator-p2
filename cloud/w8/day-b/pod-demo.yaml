apiVersion: v1
kind: Pod
metadata:
  name: nginx-pod-demo
  namespace: default
  labels:
    app: my-web-app
    tier: frontend
    env: staging
spec:
  containers:
    - name: nginx-container
      image: nginx:1.25-alpine
      imagePullPolicy: IfNotPresent
      
      # Khai báo các port container lắng nghe
      ports:
        - name: http
          containerPort: 80
          protocol: TCP
          
      # Cấu hình tài nguyên giới hạn (Resource Allocation)
      resources:
        requests:
          memory: "64Mi"
          cpu: "100m"
        limits:
          memory: "128Mi"
          cpu: "200m"
          
      # Truyền biến môi trường đơn giản
      env:
        - name: APP_COLOR
          value: "blue"
          
      # Giám sát sức khỏe container (Probes)
      # 1. Startup Probe: Đợi app khởi động hoàn tất trước khi chạy các check khác
      startupProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 2
        periodSeconds: 5
        failureThreshold: 6
        
      # 2. Liveness Probe: Kiểm tra xem app có bị treo/deadlock không
      livenessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 2
        failureThreshold: 3
        
      # 3. Readiness Probe: Kiểm tra xem app đã sẵn sàng nhận traffic chưa
      readinessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 5
        periodSeconds: 5
        timeoutSeconds: 2
        successThreshold: 1
        failureThreshold: 2
        
  restartPolicy: Always
