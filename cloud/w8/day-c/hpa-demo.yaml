apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-app-hpa
  namespace: default
spec:
  # Đối tượng mục tiêu cần co giãn
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-app-deployment
    
  # Giới hạn số lượng Pod tối thiểu và tối đa
  minReplicas: 2
  maxReplicas: 10
  
  # Chỉ số tài nguyên kích hoạt tự động co giãn
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # Tự động co giãn thêm Pod khi lượng CPU sử dụng trung bình vượt quá 50% mức request
          averageUtilization: 50
