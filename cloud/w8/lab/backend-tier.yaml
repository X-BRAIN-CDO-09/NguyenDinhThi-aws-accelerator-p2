apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-backend
  namespace: default
  labels:
    app: mini-platform
    tier: backend
spec:
  replicas: 2 # Scale 2 Pods để đảm bảo HA
  selector:
    matchLabels:
      app: mini-platform
      tier: backend
  template:
    metadata:
      labels:
        app: mini-platform
        tier: backend
    spec:
      containers:
        - name: api-container
          image: hashicorp/http-echo:0.2.3 # HTTP echo service đơn giản phản hồi text phục vụ demo
          args:
            - "-text=🚀 Welcome to API Backend! DB Connection Successful."
            - "-listen=:8080"
          ports:
            - containerPort: 8080
              name: api-port
          env:
            - name: DB_HOST
              value: "postgres-service"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: postgres-password
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5

---

apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: default
  labels:
    app: mini-platform
    tier: backend
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: mini-platform
    tier: backend
