apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-by-default
  namespace: default
spec:
  podSelector: {} # Áp dụng cho mọi Pod trong namespace default
  policyTypes:
    - Ingress
  # Mặc định từ chối tất cả traffic đi vào nếu không được định nghĩa rõ ràng ở dưới

---

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-frontend
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: mini-platform
      tier: frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        # Cho phép traffic từ Ingress Controller (thường nằm ở namespace khác hoặc có label đặc biệt)
        # Ở đây cho phép từ mọi nguồn để đảm bảo web server nhận được traffic internet
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 80

---

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-backend
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: mini-platform
      tier: backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        # CHỈ cho phép Pod có nhãn tier=frontend được truy cập vào backend
        - podSelector:
            matchLabels:
              app: mini-platform
              tier: frontend
      ports:
        - protocol: TCP
          port: 8080

---

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-to-database
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: mini-platform
      tier: database
  policyTypes:
    - Ingress
  ingress:
    - from:
        # CHỈ cho phép Pod có nhãn tier=backend được kết nối tới database
        - podSelector:
            matchLabels:
              app: mini-platform
              tier: backend
      ports:
        - protocol: TCP
          port: 5432
