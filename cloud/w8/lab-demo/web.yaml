# =============================================================================
# LAB 4 - LABELS & SELF-HEAL
# Lọc theo label & "giết" 1 Pod
# =============================================================================
# Mục tiêu: Hiểu label là "chất keo" gắn kết mọi thứ trong K8s.
#           Xóa 1 Pod thủ công → xem ReplicaSet tự tạo lại ngay lập tức.
#
# 💡 So sánh với Lab 1 (tạo Pod trần):
#    Pod trần (Lab 2) xoá là mất.
#    Pod thuộc Deployment xoá thì SỐNG LẠI ngay — vì
#    ReplicaSet giữ desired state = 3.
#
# 💡 Control loop chạy trước mắt bạn:
#    thực tế (2) ≠ mong muốn (3) → reconcile → tạo lại.
#    Không ai bấm nút gì cả.
# =============================================================================

