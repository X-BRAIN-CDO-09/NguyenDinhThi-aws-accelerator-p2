#
# Output mong đợi (bên trong Pod):
#   APP_ENV=production
#   DB_PASSWORD=s3cr3t
#
# 💡 Đổi config không cần build lại image:
#    Sửa ConfigMap → rollout lại Pod → app nhận giá trị mới.
#    Cùng 1 image chạy được mọi môi trường.
#
# ⚠️  Dùng "kubectl set env" kích hoạt một rolling update —
#    Pod được tạo lại với env mới. Đây là hành vi rollout
#    bạn sẽ học kỹ buổi chiều.
# =============================================================================

