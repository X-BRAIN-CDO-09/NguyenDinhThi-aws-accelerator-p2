# =============================================================================
# LAB 3 - DEPLOYMENT (YAML)
# Khai báo bằng file & apply
# =============================================================================
# Mục tiêu: Tạo Deployment chạy nginx với 3 Pod, apply lên Minikube.
#
# Cách tạo file và apply:
#   kubectl apply -f web.yaml
#   kubectl get deploy,rs,pods
#
# Output mong đợi sau khi apply:
#   deployment.apps/web        3/3
#   replicaset.apps/web-5d8c   3
#   pod/web-5d8c-aa   Running
#   pod/web-5d8c-bb   Running
#   pod/web-5d8c-cc   Running
#
# 💡 Declarative: web.yaml là nguồn sự thật.
#    Muốn đổi gì → sửa file → apply lại.
#    Thấy đúng phả hệ Deploy → RS → Pod như slide lý thuyết.
# =============================================================================

# TODO 1: Điền apiVersion cho Deployment
# Deployment thuộc group "apps" → apps/v1
apiVersion: apps/v1 # ← ĐIỀN VÀO ĐÂY (gợi ý: apps/v1)

# TODO 2: Điền kind
kind: Deployment # ← ĐIỀN VÀO ĐÂY (gợi ý: Deployment)

# TODO 3: Điền metadata name
# Tên này sẽ xuất hiện trong: deployment.apps/<name>
metadata: {name: web} # ← ĐIỀN VÀO ĐÂY (gợi ý: web)

spec:
  # TODO 4: Điền số replicas (số Pod muốn chạy)
  replicas: 5 # ← ĐIỀN VÀO ĐÂY (gợi ý: 3)

  # TODO 5: Điền selector — Deployment tìm Pod của mình bằng label này
  selector: {matchLabels: {app: web}} # ← ĐIỀN VÀO ĐÂY (gợi ý: app: web)

  # TODO 6: Điền template — khuôn mẫu để tạo Pod
  template:
    # TODO 6a: Labels của Pod PHẢI KHỚP với selector.matchLabels
    metadata: {labels: {app: web}} # ← ĐIỀN VÀO ĐÂY (gợi ý: app: web)

    spec:
      containers:
        # TODO 7: Điền name và image của container
        # name: tên container trong pod
        # image: nginx:1.27 (dùng tag cụ thể, không dùng latest)
        - {name: web, image: nginx:1.27} # ← ĐIỀN VÀO ĐÂY (gợi ý: name: web, image: nginx:1.27)

# =============================================================================
# LỆNH CHẠY TRÊN MINIKUBE (chạy theo thứ tự):
# =============================================================================
#
# BƯỚC 1 — Khởi động Minikube (nếu chưa chạy):
#   minikube start
#
# BƯỚC 2 — Apply file này lên cluster:
#   kubectl apply -f web.yaml
#
# BƯỚC 3 — Kiểm tra Deployment + ReplicaSet + Pod cùng lúc:
#   kubectl get deploy,rs,pods
#
# BƯỚC 4 — Xem chi tiết Deployment:
#   kubectl describe deployment web
#
# BƯỚC 5 — Thử xóa 1 Pod, xem ReplicaSet tự tạo lại:
#   kubectl delete pod <tên_pod_bất_kỳ>
#   kubectl get pods -w          ← watch Pod mới được tạo lại
#
# BƯỚC 6 — Scale lên 5 Pod bằng cách sửa replicas rồi apply lại:
#   # Sửa replicas: 3 → replicas: 5 trong file này, sau đó:
#   kubectl apply -f web.yaml
#   kubectl get pods              ← thấy 5 Pod
#
# BƯỚC 7 — Xóa Deployment khi xong:
#   kubectl delete -f web.yaml
# =============================================================================


