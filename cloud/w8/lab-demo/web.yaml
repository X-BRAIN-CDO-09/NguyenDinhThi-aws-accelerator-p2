# -----------------------------------------------------------------------------
# BƯỚC B — Self-healing: xoá 1 Pod, xem ReplicaSet tự tạo lại
# -----------------------------------------------------------------------------
#
# TODO 20: Lấy tên 1 Pod bất kỳ bằng lệnh inline (không cần copy tay)
#   Gợi ý cú pháp:
#     $(kubectl get pods -l <selector> -o name | head -1)
#   → Lấy dòng đầu tiên của danh sách pod name
#
#   Lệnh cần gõ (1 lệnh ghép):
#   kubectl delete pod \
#     $(kubectl get pods -l app=web \
#       -o name | head -1)                     # ← GÕ LỆNH NÀY VÀO TERMINAL
#
#   Output mong đợi:
#     pod "web-5d8c-aa" deleted
#
#
# TODO 21: Watch Pod mới mọc lên ngay lập tức (chạy TRƯỚC hoặc NGAY SAU bước 20)
#   Gợi ý cú pháp:
#     kubectl get pods -w
#   (Nhấn Ctrl+C để thoát watch)
#
#   Lệnh cần gõ:
#   kubectl get pods -w                        # ← GÕ LỆNH NÀY VÀO TERMINAL
#
#   Output mong đợi (xem theo thời gian thực):
#     web-5d8c-aa   1/1   Running             ← pod cũ đang sống
#     web-5d8c-aa   1/1   Terminating         ← bị xoá
#     web-5d8c-dd   0/1   Pending             ← pod MỚI xuất hiện ngay!
#     web-5d8c-dd   0/1   ContainerCreating
#     web-5d8c-dd   1/1   Running             ← pod mới đã sống

# -----------------------------------------------------------------------------
# BƯỚC C — Giải thích: tại sao Pod tự tạo lại?
# -----------------------------------------------------------------------------
#
# TODO 22: Xem ReplicaSet để hiểu "ai" đã tạo Pod mới
#   Lệnh cần gõ:
#   kubectl get replicasets                    # ← GÕ LỆNH NÀY VÀO TERMINAL
#   kubectl describe replicaset               # ← xem Events — thấy "Created pod"
#
#   📌 Giải thích:
#   ReplicaSet controller liên tục so sánh:
#     desired  = replicas: 3  (khai báo trong Deployment)
#     actual   = 2 pod đang chạy (sau khi bạn xoá 1)
#   → 2 ≠ 3 → tạo thêm 1 Pod mới cho đủ desired state.
#   → Đây là "reconcile loop" — trái tim của Kubernetes.
#
#
# TODO 23: Kiểm tra lại tổng số Pod sau khi tự heal
#   kubectl get pods                           # ← GÕ LỆNH NÀY VÀO TERMINAL
#   # Kết quả mong đợi: vẫn còn 3 Pod ở trạng thái Running

