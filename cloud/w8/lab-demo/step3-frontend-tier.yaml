# =============================================================================
# BƯỚC 3: FRONTEND TIER — Nginx Web Server
# =============================================================================
# Mục tiêu: Tạo 3 resource:
#   1. ConfigMap   → chứa nội dung trang HTML tĩnh (index.html)
#   2. Deployment  → chạy Nginx và serve trang HTML từ ConfigMap
#   3. Service     → expose Frontend trong cluster (ClusterIP)
#
# Tại sao dùng ConfigMap cho HTML?
# → Thay vì build custom Docker image chứa HTML, ta dùng ConfigMap để
#   "nhét" nội dung HTML vào Pod qua Volume Mount.
# → Đây là cách 12-Factor App — tách config (nội dung) khỏi image.
#
# Cấu trúc mount ConfigMap như file:
#   volumes:
#     - name: html-content
#       configMap:
#         name: <tên_configmap>   ← tên ConfigMap
#   volumeMounts:
#     - name: html-content
#       mountPath: /usr/share/nginx/html/   ← thư mục đích
# =============================================================================

# -----------------------------------------------------------------------------
# RESOURCE 1: ConfigMap — Nội dung HTML
# ConfigMap lưu dữ liệu dạng key-value.
# Key sẽ trở thành tên file, value sẽ trở thành nội dung file khi mount vào Pod.
# -----------------------------------------------------------------------------

# TODO 3.1: Điền apiVersion cho ConfigMap
# Gợi ý: ConfigMap thuộc core API → "v1"
apiVersion: # ← ĐIỀN VÀO ĐÂY

kind: ConfigMap

metadata:
  # TODO 3.2: Đặt tên ConfigMap
  name: # ← ĐIỀN VÀO ĐÂY (gợi ý: frontend-config)
  labels:
    tier: frontend

# TODO 3.3: Điền dữ liệu — key là tên file, value là nội dung file
# Cấu trúc:
#   data:
#     index.html: |         ← ký tự "|" cho phép viết multiline text
#       <!DOCTYPE html>
#       <html>
#         ...
#       </html>
data:
  # Viết nội dung HTML page của bạn vào đây
  # Hãy làm nó đẹp một chút! Hiển thị tên bạn, tên project, v.v.
  index.html: |
    # ← ĐIỀN NỘI DUNG HTML VÀO ĐÂY
    # Ví dụ tối thiểu:
    # <!DOCTYPE html>
    # <html>
    # <head><title>Mini K8s Platform</title></head>
    # <body>
    #   <h1>🚀 Mini K8s Platform</h1>
    #   <p>Frontend served by Nginx on Kubernetes!</p>
    #   <p>Backend API: <a href="/api">/api</a></p>
    # </body>
    # </html>


---
# -----------------------------------------------------------------------------
# RESOURCE 2: Deployment — Nginx Frontend
# Nginx sẽ serve file HTML từ ConfigMap thông qua Volume Mount.
# Nginx mặc định serve từ /usr/share/nginx/html/
# -----------------------------------------------------------------------------

# TODO 3.4: Điền apiVersion cho Deployment
apiVersion: # ← ĐIỀN VÀO ĐÂY (gợi ý: apps/v1)

kind: Deployment

metadata:
  name: frontend-deployment
  labels:
    tier: frontend

spec:
  # TODO 3.5: Số replicas
  replicas: # ← ĐIỀN VÀO ĐÂY (gợi ý: 2)

  selector:
    matchLabels:
      app: frontend
      # TODO 3.6: Điền tier label
      tier: # ← ĐIỀN VÀO ĐÂY

  template:
    metadata:
      labels:
        app: frontend
        # TODO 3.7: Phải khớp với selector.matchLabels
        tier: # ← ĐIỀN VÀO ĐÂY

    spec:
      containers:
        - name: nginx
          # TODO 3.8: Điền image Nginx
          # Dùng alpine variant cho nhỏ gọn hơn
          image: # ← ĐIỀN VÀO ĐÂY (gợi ý: nginx:alpine)

          ports:
            - containerPort: 80

          # TODO 3.9: Mount ConfigMap vào đúng thư mục serve của Nginx
          # Cấu trúc volumeMount:
          #   volumeMounts:
          #     - name: <tên_volume>           ← tham chiếu volumes[] bên dưới
          #       mountPath: <đường_dẫn>       ← đường dẫn bên trong container
          volumeMounts:
            - name: html-volume
              # Nginx serve static files từ đây
              mountPath: # ← ĐIỀN VÀO ĐÂY (gợi ý: /usr/share/nginx/html)

          # TODO 3.10: Cấu hình readinessProbe
          # Nginx trả về 200 OK khi serve được file index.html
          readinessProbe:
            httpGet:
              path: # ← ĐIỀN VÀO ĐÂY (gợi ý: /)
              port: # ← ĐIỀN VÀO ĐÂY (gợi ý: 80)
            initialDelaySeconds: 5
            periodSeconds: 5

          # TODO 3.11: Cấu hình livenessProbe
          livenessProbe:
            httpGet:
              path: # ← ĐIỀN VÀO ĐÂY (gợi ý: /)
              port: # ← ĐIỀN VÀO ĐÂY (gợi ý: 80)
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3

          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"

      volumes:
        # TODO 3.12: Khai báo volume lấy dữ liệu từ ConfigMap
        # Cấu trúc:
        #   - name: <tên_volume>       ← tên tham chiếu trong volumeMounts
        #     configMap:
        #       name: <tên_configmap>  ← tên ConfigMap đã tạo ở Resource 1
        - name: html-volume
          configMap:
            name: # ← ĐIỀN VÀO ĐÂY (tên ConfigMap từ TODO 3.2)


---
# -----------------------------------------------------------------------------
# RESOURCE 3: Service — ClusterIP cho Frontend
# Ingress sẽ dùng tên Service này để route traffic "/" đến Frontend.
# DNS trong cluster: http://frontend-service:80
# -----------------------------------------------------------------------------

# TODO 3.13: Điền apiVersion cho Service
apiVersion: # ← ĐIỀN VÀO ĐÂY (gợi ý: v1)

kind: Service

metadata:
  # TODO 3.14: Đặt tên "frontend-service"
  # ⚠️ Ingress ở Bước 4 sẽ dùng tên này
  name: # ← ĐIỀN VÀO ĐÂY
  labels:
    tier: frontend

spec:
  selector:
    # TODO 3.15: Chọn đúng Pod frontend
    app: # ← ĐIỀN VÀO ĐÂY (gợi ý: frontend)
    tier: # ← ĐIỀN VÀO ĐÂY (gợi ý: frontend)

  ports:
    - protocol: TCP
      # TODO 3.16: Port của Service
      port: # ← ĐIỀN VÀO ĐÂY (gợi ý: 80)
      # TODO 3.17: targetPort khớp với containerPort của Nginx
      targetPort: # ← ĐIỀN VÀO ĐÂY (gợi ý: 80)

  # TODO 3.18: Loại Service
  type: # ← ĐIỀN VÀO ĐÂY (gợi ý: ClusterIP)
