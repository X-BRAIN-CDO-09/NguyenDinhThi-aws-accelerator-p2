# =============================================================================
# BƯỚC 5: NETWORK POLICY — Zero-Trust Security
# =============================================================================
# Mục tiêu: Áp dụng mô hình bảo mật Zero-Trust:
#   - Mặc định: CHẶN TẤT CẢ traffic (deny-all)
#   - Sau đó: CHỈ cho phép những luồng traffic cần thiết
#
# Mô hình Zero-Trust cho hệ thống này:
#
#   [Internet] → [Ingress Controller] → [Frontend]
#                                           ↓ (CHỈ frontend → backend)
#                                       [Backend]
#                                           ↓ (CHỈ backend → database)
#                                       [Database]
#
# Chúng ta sẽ tạo 5 NetworkPolicy:
#   1. deny-all-default    → Chặn tất cả IN và OUT cho toàn namespace
#   2. allow-frontend-from-ingress → Frontend nhận traffic từ Ingress Controller
#   3. allow-frontend-egress       → Frontend gọi được ra ngoài (DNS + Internet cơ bản)
#   4. allow-backend-from-frontend → Backend chỉ nhận traffic từ Frontend
#   5. allow-db-from-backend       → DB chỉ nhận traffic từ Backend
#
# QUAN TRỌNG: NetworkPolicy chỉ hoạt động khi có CNI hỗ trợ!
#   → Minikube phải start với: minikube start --cni=calico
#
# Cấu trúc NetworkPolicy:
#   spec:
#     podSelector:          ← áp dụng policy này cho Pod nào (dựa vào label)
#       matchLabels:
#         tier: database
#     policyTypes:          ← loại traffic nào được kiểm soát
#       - Ingress           ← traffic đi VÀO Pod
#       - Egress            ← traffic đi RA từ Pod
#     ingress:              ← quy tắc CHO PHÉP traffic vào (whitelist)
#       - from:
#           - podSelector:
#               matchLabels:
#                 tier: backend
#         ports:
#           - protocol: TCP
#             port: 5432
#     egress:               ← quy tắc CHO PHÉP traffic ra (whitelist)
#       - to:
#           - podSelector:
#               matchLabels:
#                 app: postgres
# =============================================================================

# -----------------------------------------------------------------------------
# POLICY 1: Deny-All (Nền tảng Zero-Trust)
# Áp dụng cho TẤT CẢ Pod trong namespace, chặn toàn bộ traffic mặc định.
# Sau đó các policy sau sẽ "mở lỗ" cho từng luồng cụ thể.
# -----------------------------------------------------------------------------

# TODO 5.1: Điền apiVersion cho NetworkPolicy
# Gợi ý: NetworkPolicy thuộc networking group → "networking.k8s.io/v1"
apiVersion: # ← ĐIỀN VÀO ĐÂY

# TODO 5.2: Điền kind là "NetworkPolicy"
kind: # ← ĐIỀN VÀO ĐÂY

metadata:
  name: deny-all-default

spec:
  # TODO 5.3: podSelector rỗng "{}" nghĩa là áp dụng cho TẤT CẢ Pod trong namespace
  podSelector: {} # ← GIỮ NGUYÊN — {} = match all pods

  # TODO 5.4: Khai báo kiểm soát cả Ingress và Egress
  # Cấu trúc:
  #   policyTypes:
  #     - Ingress
  #     - Egress
  policyTypes:
    # ← ĐIỀN VÀO ĐÂY (thêm Ingress và Egress)

  # Không có ingress[] và egress[] rules → mặc định CHẶN TẤT CẢ
  # (Không cần viết thêm gì bên dưới cho policy này)


---
# -----------------------------------------------------------------------------
# POLICY 2: Cho phép Frontend nhận traffic từ Ingress Controller
# Ingress Controller nằm trong namespace "ingress-nginx"
# -----------------------------------------------------------------------------

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: allow-frontend-from-ingress

spec:
  # TODO 5.5: Áp dụng policy này cho Pod có label tier=frontend
  podSelector:
    matchLabels:
      # ← ĐIỀN VÀO ĐÂY (gợi ý: tier: frontend)

  policyTypes:
    - Ingress   # Chỉ kiểm soát traffic đi VÀO frontend

  ingress:
    - from:
        # Cho phép traffic từ Ingress Controller (namespace ingress-nginx)
        # Cấu trúc cho phép từ namespace khác:
        #   - namespaceSelector:
        #       matchLabels:
        #         kubernetes.io/metadata.name: ingress-nginx
        # TODO 5.6: Điền namespaceSelector để chỉ cho phép từ ingress-nginx namespace
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: # ← ĐIỀN VÀO ĐÂY (gợi ý: ingress-nginx)
      ports:
        - protocol: TCP
          # TODO 5.7: Port của frontend container
          port: # ← ĐIỀN VÀO ĐÂY (gợi ý: 80)


---
# -----------------------------------------------------------------------------
# POLICY 3: Cho phép Frontend gọi ra ngoài (Egress)
# Frontend cần gọi DNS và gọi Backend → cần cho phép egress
# -----------------------------------------------------------------------------

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: allow-frontend-egress

spec:
  podSelector:
    matchLabels:
      tier: frontend

  policyTypes:
    - Egress

  egress:
    # Cho phép gọi đến Backend Service
    - to:
        - podSelector:
            matchLabels:
              # TODO 5.8: Chọn đúng Pod backend
              tier: # ← ĐIỀN VÀO ĐÂY (gợi ý: backend)
      ports:
        - protocol: TCP
          port: 5678  # Port của backend container

    # Cho phép DNS resolution (không có DNS → không tìm được service nào)
    # DNS dùng UDP port 53
    - ports:
        - protocol: UDP
          port: 53


---
# -----------------------------------------------------------------------------
# POLICY 4: Backend chỉ nhận traffic từ Frontend (và Ingress Controller)
# Đây là lớp bảo vệ quan trọng — chặn truy cập trực tiếp vào API từ internet
# -----------------------------------------------------------------------------

# TODO 5.9: Điền apiVersion và kind cho NetworkPolicy tiếp theo
apiVersion: # ← ĐIỀN VÀO ĐÂY
kind: # ← ĐIỀN VÀO ĐÂY

metadata:
  name: allow-backend-from-frontend-and-ingress

spec:
  # TODO 5.10: Áp dụng cho Pod backend
  podSelector:
    matchLabels:
      # ← ĐIỀN VÀO ĐÂY (gợi ý: tier: backend)

  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Nguồn 1: Cho phép từ Frontend pods
    - from:
        - podSelector:
            matchLabels:
              # TODO 5.11: Điền label của Frontend pod
              tier: # ← ĐIỀN VÀO ĐÂY (gợi ý: frontend)
      ports:
        - protocol: TCP
          # TODO 5.12: Port của backend container
          port: # ← ĐIỀN VÀO ĐÂY (gợi ý: 5678)

    # Nguồn 2: Cho phép từ Ingress Controller (để curl /api qua Ingress hoạt động)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 5678

  egress:
    # Backend được phép kết nối đến Database
    - to:
        - podSelector:
            matchLabels:
              # TODO 5.13: Điền label của Database pod
              tier: # ← ĐIỀN VÀO ĐÂY (gợi ý: database)
      ports:
        - protocol: TCP
          # TODO 5.14: Port của PostgreSQL
          port: # ← ĐIỀN VÀO ĐÂY (gợi ý: 5432)

    # Backend cần DNS để resolve postgres-service DNS name
    - ports:
        - protocol: UDP
          port: 53


---
# -----------------------------------------------------------------------------
# POLICY 5: Database CHỈ nhận traffic từ Backend
# Đây là lớp bảo vệ quan trọng nhất — Database không được expose ra ngoài
# -----------------------------------------------------------------------------

# TODO 5.15: Viết hoàn chỉnh NetworkPolicy cho Database
# Yêu cầu:
#   - Tên: allow-db-from-backend
#   - podSelector: áp dụng cho pod có tier=database
#   - policyTypes: chỉ cần kiểm soát Ingress (DB không cần call ra ngoài)
#   - ingress: chỉ cho phép từ Pod có tier=backend, port 5432

