# =============================================================================
# KIỂM TRA NGHIỆM THU ZERO-TRUST (sau khi apply tất cả policies):
# =============================================================================
#
# TEST 1: Pod không có label không thể reach Database ✅
#   kubectl run test --image=busybox --rm -it -- sh
#   # Bên trong pod:
#   wget -qO- --timeout=5 http://postgres-service:5432
#   # Kết quả mong đợi: wget: bad address / timeout → BỊ CHẶN ✅
#
# TEST 2: Pod không có label không thể reach Backend ✅
#   kubectl run test --image=busybox --rm -it -- sh
#   # Bên trong pod:
#   wget -qO- --timeout=5 http://backend-service:80
#   # Kết quả mong đợi: timeout → BỊ CHẶN ✅
#
# TEST 3: Ingress vẫn hoạt động ✅
#   curl http://mini-platform.local/api
#   # Kết quả mong đợi: "Hello from Backend API!" → PASS ✅
#
# TEST 4: Frontend vẫn hoạt động ✅
#   curl http://mini-platform.local
#   # Kết quả mong đợi: HTML page → PASS ✅
# =============================================================================
