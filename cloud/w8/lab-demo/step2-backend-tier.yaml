# =============================================================================
# BƯỚC 2: BACKEND TIER — API Application
# =============================================================================
# Mục tiêu: Tạo 2 resource:
#   1. Deployment  → chạy container API (dùng image hashicorp/http-echo đơn giản)
#   2. Service     → expose Backend API trong cluster (ClusterIP)
#
# Lưu ý quan trọng về Probes (cơ chế giám sát sức khỏe):
# ┌─────────────────┬──────────────────────────────────────────────────────┐
# │ Probe           │ Tác dụng khi FAIL                                    │
# ├─────────────────┼──────────────────────────────────────────────────────┤
# │ livenessProbe   │ Kill container và RESTART lại                        │
# │ readinessProbe  │ Ngắt Pod khỏi Service (không restart)               │
# │ startupProbe    │ Delay liveness/readiness cho app khởi động chậm     │
# └─────────────────┴──────────────────────────────────────────────────────┘
#
# Cấu trúc của một Probe:
#   livenessProbe:
#     httpGet:
#       path: /health     ← HTTP GET request đến đường dẫn này
#       port: 8080        ← port của container
#     initialDelaySeconds: 10  ← chờ bao lâu trước khi bắt đầu probe lần đầu
#     periodSeconds: 5         ← kiểm tra mỗi bao lâu 1 lần
#     failureThreshold: 3      ← fail bao nhiêu lần liên tiếp thì mới hành động
# =============================================================================

# -----------------------------------------------------------------------------
# RESOURCE 1: Deployment — Backend API
# Dùng image "hashicorp/http-echo" — một HTTP server cực nhẹ trả về text tĩnh
# Cú pháp: http-echo -text="<nội_dung_trả_về>" -listen=:<port>
# -----------------------------------------------------------------------------

# TODO 2.1: Điền apiVersion cho Deployment
# Gợi ý: Deployment thuộc group "apps" → "apps/v1"
apiVersion: # ← ĐIỀN VÀO ĐÂY

kind: Deployment

metadata:
  name: backend-deployment
  labels:
    tier: backend

spec:
  # TODO 2.2: Chọn số replicas cho Backend (khuyến nghị 2 để thấy load balancing)
  replicas: # ← ĐIỀN VÀO ĐÂY (gợi ý: 2)

  selector:
    matchLabels:
      app: backend
      # TODO 2.3: Điền label tier để phân biệt
      tier: # ← ĐIỀN VÀO ĐÂY

  template:
    metadata:
      labels:
        app: backend
        # TODO 2.4: Phải khớp với selector.matchLabels
        tier: # ← ĐIỀN VÀO ĐÂY

    spec:
      containers:
        - name: backend-api
          # TODO 2.5: Điền image
          # Image "hashicorp/http-echo" là HTTP server đơn giản, nhẹ, dễ test
          # Không cần cài Node.js hay viết code — dùng thẳng image này cho lab
          image: # ← ĐIỀN VÀO ĐÂY (gợi ý: hashicorp/http-echo:latest)

          # TODO 2.6: Truyền arguments vào container
          # Cú pháp args trong K8s YAML:
          #   args:
          #     - "-text=<nội_dung>"    ← nội dung HTTP response
          #     - "-listen=:<port>"     ← port lắng nghe
          args:
            - # ← ĐIỀN VÀO ĐÂY (gợi ý: "-text=Hello from Backend API! Connected to DB.")
            - # ← ĐIỀN VÀO ĐÂY (gợi ý: "-listen=:5678")

          ports:
            # TODO 2.7: Khai báo containerPort (phải khớp với -listen ở args)
            - containerPort: # ← ĐIỀN VÀO ĐÂY (gợi ý: 5678)

          # TODO 2.8: Nạp biến môi trường DB_PASSWORD từ Secret của Bước 1
          # ⚠️ Tên Secret và Key phải CHÍNH XÁC với những gì bạn tạo trong step1
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  # Tên Secret đã tạo ở step1-db-tier.yaml
                  name: # ← ĐIỀN VÀO ĐÂY (gợi ý: postgres-secret)
                  # Key trong Secret
                  key: # ← ĐIỀN VÀO ĐÂY (gợi ý: POSTGRES_PASSWORD)

            # TODO 2.9: Thêm biến DB_HOST là tên Service của PostgreSQL
            # Tên Service = DNS hostname bên trong cluster
            - name: DB_HOST
              value: # ← ĐIỀN VÀO ĐÂY (gợi ý: "postgres-service")

            - name: DB_PORT
              value: # ← ĐIỀN VÀO ĐÂY (gợi ý: "5432")

          # TODO 2.10: Cấu hình livenessProbe
          # Kiểm tra: container có còn sống không?
          # Nếu fail → kill và restart container
          livenessProbe:
            httpGet:
              # TODO 2.10a: Đường dẫn để probe gửi HTTP GET
              path: # ← ĐIỀN VÀO ĐÂY (gợi ý: /)
              # TODO 2.10b: Port của container (phải khớp containerPort)
              port: # ← ĐIỀN VÀO ĐÂY (gợi ý: 5678)
            # Chờ 15 giây sau khi container start mới bắt đầu probe
            initialDelaySeconds: 15
            # Probe mỗi 10 giây 1 lần
            periodSeconds: 10
            # Fail 3 lần liên tiếp → restart
            failureThreshold: 3

          # TODO 2.11: Cấu hình readinessProbe
          # Kiểm tra: container đã sẵn sàng nhận traffic chưa?
          # Nếu fail → ngắt Pod khỏi Service (không restart)
          readinessProbe:
            httpGet:
              # TODO 2.11a: Đường dẫn kiểm tra
              path: # ← ĐIỀN VÀO ĐÂY (gợi ý: /)
              # TODO 2.11b: Port của container
              port: # ← ĐIỀN VÀO ĐÂY (gợi ý: 5678)
            # Probe sớm hơn liveness để traffic vào nhanh hơn
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3

          # TODO 2.12: Cấu hình resource requests và limits
          resources:
            requests:
              memory: # ← ĐIỀN VÀO ĐÂY (gợi ý: "64Mi")
              cpu: # ← ĐIỀN VÀO ĐÂY (gợi ý: "100m")
            limits:
              memory: # ← ĐIỀN VÀO ĐÂY (gợi ý: "128Mi")
              cpu: # ← ĐIỀN VÀO ĐÂY (gợi ý: "200m")


---
# -----------------------------------------------------------------------------
# RESOURCE 2: Service — ClusterIP cho Backend
# Các Pod frontend và Ingress sẽ dùng tên Service này để gọi API.
# DNS trong cluster: http://backend-service:80
# -----------------------------------------------------------------------------

# TODO 2.13: Điền apiVersion cho Service
apiVersion: # ← ĐIỀN VÀO ĐÂY (gợi ý: v1)

kind: Service

metadata:
  # TODO 2.14: Đặt tên "backend-service"
  # ⚠️ Ingress ở Bước 4 sẽ dùng tên này làm serviceName
  name: # ← ĐIỀN VÀO ĐÂY
  labels:
    tier: backend

spec:
  selector:
    # TODO 2.15: Chọn đúng Pod backend
    # Phải khớp với template.metadata.labels của Deployment trên
    app: # ← ĐIỀN VÀO ĐÂY (gợi ý: backend)
    tier: # ← ĐIỀN VÀO ĐÂY (gợi ý: backend)

  ports:
    - protocol: TCP
      # TODO 2.16: Port của Service (port mà Ingress sẽ gọi đến)
      port: # ← ĐIỀN VÀO ĐÂY (gợi ý: 80)
      # TODO 2.17: targetPort (port container đang lắng nghe, phải khớp containerPort)
      targetPort: # ← ĐIỀN VÀO ĐÂY (gợi ý: 5678)

  # TODO 2.18: Loại Service (chỉ cần truy cập nội bộ từ Ingress)
  type: # ← ĐIỀN VÀO ĐÂY (gợi ý: ClusterIP)
