# Build and push Docker image to GitHub Container Registry
# Pipeline: Build (local) → Trivy Scan → Push → Cosign Sign
name: Build and Push w10-api Image

on:
  push:
    branches:
      - main
    paths:
      - 'cloud/w10/lab-temp/src/api/**'
      - '.github/workflows/build-push-w10.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/nguyendinhthi-aws-accelerator-p2/w10-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write  # Required for Cosign OIDC

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.LAB_PAT }}

      # ── Lowercase IMAGE_NAME (GHCR requirement) ───────────────────────────
      - name: Lowercase image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Calculate semantic version
        id: semver
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "w10-v"
          major_pattern: "(BREAKING CHANGE:|!:)"
          minor_pattern: "^feat"
          version_format: "${major}.${minor}.${patch}"
          bump_each_commit: false

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.semver.outputs.version }}
            type=sha,prefix=v${{ steps.semver.outputs.version }}-

      # ── STEP 1: Build image locally (do NOT push yet) ────────────────────
      - name: Build Docker image (local only)
        uses: docker/build-push-action@v6
        with:
          context: ./cloud/w10/lab-temp/src/api
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # ── STEP 2: Trivy vulnerability scan ─────────────────────────────────
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # ── STEP 3: Push image (only after scan passes) ───────────────────────
      - name: Push Docker image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: ./cloud/w10/lab-temp/src/api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # ── STEP 4: Install Cosign ────────────────────────────────────────────
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.3'

      # ── STEP 5: Sign image with Cosign private key ────────────────────────
      - name: Sign Docker image with Cosign
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          IMAGE_DIGEST=$(docker inspect \
            --format='{{index .RepoDigests 0}}' \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }} \
            2>/dev/null | cut -d'@' -f2 || echo "")

          if [ -z "$IMAGE_DIGEST" ]; then
            echo "Fetching digest from registry..."
            IMAGE_DIGEST=$(docker buildx imagetools inspect \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }} \
              --format '{{.Manifest.Digest}}')
          fi

          cosign sign --yes \
            --key env://COSIGN_PRIVATE_KEY \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${IMAGE_DIGEST}"

          echo "✅ Image signed successfully!"
          echo "   Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }}"

      # ── GitOps: update rollout.yaml with new version ─────────────────────
      - name: Update rollout.yaml with new version
        run: |
          IMAGE_FULL="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }}"
          sed -i "s|image: ghcr.io/.*/w10-api:.*|image: ${IMAGE_FULL}|g" \
            cloud/w10/lab-temp/app-api/rollout.yaml
          sed -i "s|value: \"v.*\"|value: \"v${{ steps.semver.outputs.version }}\"|g" \
            cloud/w10/lab-temp/app-api/rollout.yaml

      - name: Commit and push version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cloud/w10/lab-temp/app-api/rollout.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: bump w10-api version to v${{ steps.semver.outputs.version }}"
            git push
          fi

      - name: Create git tag
        run: |
          git tag w10-v${{ steps.semver.outputs.version }} || true
          git push origin w10-v${{ steps.semver.outputs.version }} || true
