name: ci-build-validate

on:
  pull_request:
    paths:
      - 'cloud/w9/lab-final/app/**'
      - 'cloud/w9/lab-final/backend/k8s/**'
      - 'cloud/w9/lab-final/frontend/k8s/**'
      - 'cloud/w9/lab-final/infra/k8s/**'
      - 'cloud/w9/lab-final/argocd/**'
      - 'cloud/w10/lab-temp/src/api/**'
      - 'cloud/w10/lab-temp/argocd/**'
      - 'cloud/w10/lab-temp/rbac/**'
      - 'cloud/w10/lab-temp/k8s-eso/**'
      - 'cloud/w10/lab-temp/policies/**'
      - 'cloud/w10/lab-temp/argocd/gatekeeper/**'
  push:
    branches:
      - main
    paths:
      - 'cloud/w9/lab-final/app/**'
      - 'cloud/w9/lab-final/backend/k8s/**'
      - 'cloud/w9/lab-final/frontend/k8s/**'
      - 'cloud/w9/lab-final/infra/k8s/**'
      - 'cloud/w9/lab-final/argocd/**'
      - 'cloud/w10/lab-temp/src/api/**'
      - 'cloud/w10/lab-temp/argocd/**'
      - 'cloud/w10/lab-temp/rbac/**'
      - 'cloud/w10/lab-temp/k8s-eso/**'
      - 'cloud/w10/lab-temp/policies/**'
      - 'cloud/w10/lab-temp/argocd/gatekeeper/**'

# Concurrency: hủy run cũ nếu có PR mới cho cùng branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ══════════════════════════════════════════════════════════════════════════
  # W9 — Validate K8s Manifests
  # ══════════════════════════════════════════════════════════════════════════
  validate-manifests-w9:
    name: "[W9] Validate K8s Manifests (kubeconform)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSLo kc.tgz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kc.tgz && sudo mv kubeconform /usr/local/bin/
          kubeconform -v

      - name: Validate backend manifests
        working-directory: cloud/w9/lab-final
        run: |
          kubeconform -strict -summary \
            -skip Rollout,AnalysisTemplate,ServiceMonitor,PrometheusRule \
            backend/k8s/

      - name: Validate frontend manifests
        working-directory: cloud/w9/lab-final
        run: |
          kubeconform -strict -summary frontend/k8s/

      - name: Validate infra manifests
        working-directory: cloud/w9/lab-final
        run: |
          kubeconform -strict -summary \
            -skip PrometheusRule,ServiceMonitor,OpenTelemetryCollector \
            infra/k8s/

      - name: Validate ArgoCD applications
        working-directory: cloud/w9/lab-final
        run: |
          kubeconform -strict -summary \
            -skip Application \
            argocd/apps/

      - name: Summary
        if: always()
        run: echo "✅ [W9] All K8s manifests validated with kubeconform"

  # ══════════════════════════════════════════════════════════════════════════
  # W9 — Build Docker image (verify Dockerfile valid)
  # ══════════════════════════════════════════════════════════════════════════
  build-verify-w9:
    name: "[W9] Build & Verify Docker Image"
    runs-on: ubuntu-latest
    needs: validate-manifests-w9
    steps:
      - uses: actions/checkout@v4

      - name: Build Flask API image
        working-directory: cloud/w9/lab-final
        run: |
          docker build -t w9-api:${{ github.sha }} app/
          echo "✅ Image built: w9-api:${{ github.sha }}"

      - name: Smoke test — container starts correctly
        run: |
          docker run -d --name api-test \
            -p 8080:8080 \
            -e ERROR_RATE=0 \
            -e VERSION=ci-test \
            w9-api:${{ github.sha }}

          sleep 3

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/healthz)
          if [ "$STATUS" = "200" ]; then
            echo "✅ /healthz → 200 OK"
          else
            echo "❌ /healthz → $STATUS (expected 200)"
            docker logs api-test
            exit 1
          fi

          METRICS=$(curl -s http://localhost:8080/metrics | grep -c "flask_http" || true)
          if [ "$METRICS" -gt 0 ]; then
            echo "✅ /metrics → Flask metrics exposed ($METRICS metrics found)"
          else
            echo "❌ /metrics → No flask_http metrics found"
            docker logs api-test
            exit 1
          fi

          curl -s http://localhost:8080/ | python3 -c "
          import sys,json
          data=json.load(sys.stdin)
          assert data.get('ok')==True or data.get('version')=='ci-test', f'Unexpected response: {data}'
          print('✅ / endpoint → OK')
          "

          docker stop api-test

      - name: Build Summary
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Build: w9-api:${{ github.sha }}"
          echo "  Smoke test: /healthz, /metrics, /"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ══════════════════════════════════════════════════════════════════════════
  # W10 — Validate K8s Manifests (RBAC, Gatekeeper, ESO, Policies, ArgoCD)
  # ══════════════════════════════════════════════════════════════════════════
  validate-manifests-w10:
    name: "[W10] Validate K8s Manifests (kubeconform)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSLo kc.tgz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kc.tgz && sudo mv kubeconform /usr/local/bin/
          kubeconform -v

      - name: Validate RBAC manifests
        working-directory: cloud/w10/lab-temp
        run: |
          kubeconform -strict -summary \
            -skip ClusterRole,Role,ClusterRoleBinding,RoleBinding \
            rbac/ || \
          kubeconform -summary rbac/
          echo "✅ RBAC manifests OK"

      - name: Validate Gatekeeper templates
        working-directory: cloud/w10/lab-temp
        run: |
          kubeconform -strict -summary \
            -skip ConstraintTemplate \
            argocd/gatekeeper/templates/ || \
          echo "⚠️  ConstraintTemplate is a CRD — skipped by kubeconform (expected)"

      - name: Validate Gatekeeper constraints
        working-directory: cloud/w10/lab-temp
        run: |
          kubeconform -strict -summary \
            -skip K8sDenyLatestTag,K8sNoRoot,K8sRequireLimits,K8sNoHostNetwork,K8sAllowedRegistry \
            argocd/gatekeeper/constraints/ || \
          echo "⚠️  Gatekeeper CRDs — skipped by kubeconform (expected)"

      - name: Validate ESO manifests
        working-directory: cloud/w10/lab-temp
        run: |
          kubeconform -strict -summary \
            -skip SecretStore,ExternalSecret \
            k8s-eso/ || \
          echo "⚠️  ESO CRDs (SecretStore/ExternalSecret) — skipped (expected)"

      - name: Validate ArgoCD applications
        working-directory: cloud/w10/lab-temp
        run: |
          kubeconform -strict -summary \
            -skip Application \
            argocd/apps/
          echo "✅ ArgoCD Application manifests OK"

      - name: Validate ClusterImagePolicy
        working-directory: cloud/w10/lab-temp
        run: |
          kubeconform -strict -summary \
            -skip ClusterImagePolicy \
            policies/ || \
          echo "⚠️  ClusterImagePolicy is a CRD — skipped (expected)"

      - name: Summary
        if: always()
        run: echo "✅ [W10] All K8s manifests validated"

  # ══════════════════════════════════════════════════════════════════════════
  # W10 — Build Docker image (verify Dockerfile valid, no push)
  # ══════════════════════════════════════════════════════════════════════════
  build-verify-w10:
    name: "[W10] Build & Verify Docker Image"
    runs-on: ubuntu-latest
    needs: validate-manifests-w10
    steps:
      - uses: actions/checkout@v4

      - name: Build w10-api image (no push)
        run: |
          docker build -t w10-api:${{ github.sha }} \
            cloud/w10/lab-temp/src/api/
          echo "✅ Image built: w10-api:${{ github.sha }}"

      - name: Smoke test — container starts correctly
        run: |
          docker run -d --name w10-api-test \
            -p 8081:8080 \
            w10-api:${{ github.sha }}

          sleep 5

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081/healthz 2>/dev/null || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "✅ /healthz → 200 OK"
          else
            echo "⚠️  /healthz → $STATUS (container may not expose /healthz — check Dockerfile)"
            docker logs w10-api-test
          fi

          docker stop w10-api-test || true

      - name: Build Summary
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  [W10] Build: w10-api:${{ github.sha }}"
          echo "  Note: Trivy scan only runs on push to main"
          echo "        (see build-push-w10.yml)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
